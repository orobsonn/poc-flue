name = "auditor"
main = "dist/_entry.ts"
compatibility_date = "2026-05-11"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "auditor"
database_id = "b438f664-3527-477b-bfb6-298698af5e28"

[[r2_buckets]]
binding = "AUDITOR_R2"
bucket_name = "auditor"

[triggers]
crons = [
  "*/15 * * * *",
  "0 */6 * * *",
]

[vars]
MODEL_MAIN = "cloudflare-workers-ai/@cf/moonshotai/kimi-k2.6"
JANELA_HORAS = "6"
BUCKET_K_REPRESENTATIVES = "3"
SAMPLE_MIN_PER_BUCKET = "5"
WINDOWS_SILENT_TO_RESOLVE = "2"
DAYS_ACTIVE_TO_STALE = "30"
GITHUB_DEFAULT_BRANCH = "main"
