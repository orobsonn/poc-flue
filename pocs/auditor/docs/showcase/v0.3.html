<script>
(() => {
  'use strict';
  const DATA = JSON.parse(document.getElementById('runs-data').textContent);

  const fmtMs = (ms) => {
    if (ms == null) return '—';
    const s = Math.round(ms / 1000);
    if (s < 60) return `${s}s`;
    return `${Math.floor(s / 60)}m ${String(s % 60).padStart(2, '0')}s`;
  };
  const fmtStep = (ms) => {
    if (!ms || ms < 100) return '<0.1s';
    if (ms < 1000) return `${ms}ms`;
    return `${(ms/1000).toFixed(1)}s`;
  };
  const fmtDate = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())} UTC`;
  };

  function el(tag, attrs, children) {
    attrs = attrs || {}; children = children || [];
    const node = document.createElement(tag);
    for (const k of Object.keys(attrs)) {
      const v = attrs[k];
      if (v == null || v === false) continue;
      if (k === 'class') node.className = v;
      else if (k === 'dataset') { for (const dk of Object.keys(v)) node.dataset[dk] = v[dk]; }
      else if (k === 'style') node.setAttribute('style', v);
      else if (k === 'title') node.title = v;
      else if (k === 'onClick') node.addEventListener('click', v);
      else node.setAttribute(k, v);
    }
    const list = Array.isArray(children) ? children : [children];
    for (const c of list) {
      if (c == null || c === false) continue;
      node.appendChild(typeof c === 'string' || typeof c === 'number'
        ? document.createTextNode(String(c)) : c);
    }
    return node;
  }
  const clear = (n) => { while (n.firstChild) n.removeChild(n.firstChild); };

  function renderRuns() {
    const list = document.getElementById('runsList');
    clear(list);
    const sorted = [...DATA.runs].sort((a, b) => b.stage - a.stage || new Date(b.ts) - new Date(a.ts));
    let lastStage = null;
    for (const r of sorted) {
      if (r.stage !== lastStage) {
        list.appendChild(el('div', { class: 'run-section-label' }, `— Stage ${r.stage}`));
        lastStage = r.stage;
      }
      const sev = r.metrics.severity;
      const metaChildren = [
        el('span', {}, [el('b', {}, fmtMs(r.metrics.latency_ms))]),
        el('span', {}, [el('b', {}, String(r.metrics.llm_calls)), ' LLM']),
        el('span', {}, [el('b', {}, r.metrics.cost_usd != null ? `$${r.metrics.cost_usd.toFixed(2)}` : '—')]),
      ];
      const item = el('a', { class: 'run-item', dataset: { rid: r.rid } }, [
        el('div', { class: 'row1' }, [
          el('div', { class: 'stage-tag' }, r.stage_label),
          el('span', { class: `sev ${sev}` }, sev),
        ]),
        el('div', { class: 'rid' }, r.rid),
        el('div', { class: 'desc' }, r.stage_desc),
        el('div', { class: 'meta' }, metaChildren),
      ]);
      item.addEventListener('click', () => selectRun(r.rid));
      list.appendChild(item);
    }
  }

  function buildStep(step, idx, opts) {
    opts = opts || {};
    const stepNode = el('div', { class: `step tool-${step.tool}` });
    const headChildren = [
      el('div', { class: 'step-idx' }, String(idx).padStart(2, '0')),
      el('div', { class: 'step-tool' }, [
        el('span', { class: 'dot' }),
        step.tool,
        step.sub_kind ? el('span', { class: 'kind-tag' }, step.sub_kind) : null,
      ]),
      el('div', { class: 'step-preview' }, step.input_preview || step.result_preview || '—'),
      el('div', { class: 'step-meta' }, `+${fmtStep(step.elapsed_ms)}`),
    ];
    const head = el('div', { class: 'step-head' }, headChildren);
    head.addEventListener('click', () => stepNode.classList.toggle('open'));
    stepNode.appendChild(head);

    const bodyChildren = [];
    if (step.thinking) {
      bodyChildren.push(el('div', { class: 'thinking-block' }, step.thinking));
    }
    if (step.input_full) {
      bodyChildren.push(el('div', { class: 'field' }, [
        el('div', { class: 'field-label input' }, 'INPUT'),
        el('div', { class: 'field-content' }, step.input_full),
      ]));
    }
    if (step.result_full) {
      bodyChildren.push(el('div', { class: 'field' }, [
        el('div', { class: 'field-label result' }, 'RESULT'),
        el('div', { class: 'field-content' }, step.result_full),
      ]));
    } else {
      bodyChildren.push(el('div', { class: 'field' }, [
        el('div', { class: 'field-label result' }, 'RESULT'),
        el('div', { class: 'field-content empty' }, '— sem retorno —'),
      ]));
    }
    stepNode.appendChild(el('div', { class: 'step-body' }, bodyChildren));

    if (step.children && step.children.length) {
      const childWrap = el('div', { class: 'children' }, [
        el('div', { class: 'children-label' }, `sub-session ${step.sub_kind || ''} · ${step.children.length} step${step.children.length === 1 ? '' : 's'}`),
        ...step.children.map((c, i) => buildStep(c, i + 1, { nested: true })),
      ]);
      stepNode.appendChild(childWrap);
    }
    return stepNode;
  }

  function buildTrace(steps) {
    if (!steps || !steps.length) {
      return el('div', { class: 'field-content empty' }, '— trace indisponível pra este run —');
    }
    const wrap = el('div', { class: 'trace' });
    steps.forEach((s, i) => wrap.appendChild(buildStep(s, i + 1)));
    return wrap;
  }

  function buildDivTable(divs) {
    if (!divs.length) {
      return el('table', { class: 'tbl' }, [
        el('tbody', {}, [el('tr', { class: 'empty' }, [el('td', { colspan: 5 }, '— sem divergências detectadas neste run —')])]),
      ]);
    }
    const thead = el('thead', {}, [el('tr', {}, [
      el('th', {}, 'Bucket'),
      el('th', {}, 'Heurístico ignorado'),
      el('th', {}, 'Evidência (literal)'),
      el('th', {}, 'Target'),
      el('th', {}, 'Sev'),
    ])]);
    const tbody = el('tbody', {}, divs.map((d) => {
      const targetCls = (d.target || '').replace(/[^a-z]/g, '');
      return el('tr', {}, [
        el('td', { class: 'bucket' }, d.bucket),
        el('td', { class: 'heur' }, d.heuristic),
        el('td', { class: 'ev' }, `"${d.evidence}"`),
        el('td', {}, [el('span', { class: `target ${targetCls}` }, d.target)]),
        el('td', {}, [el('span', { class: 'sev-pill' }, d.severity)]),
      ]);
    }));
    return el('table', { class: 'tbl' }, [thead, tbody]);
  }

  function buildRationale(text) {
    if (!text) {
      return el('div', { class: 'rationale missing' }, '— rationale do agente não disponível pra este stage —');
    }
    return el('div', { class: 'rationale' }, text);
  }

  function buildKpis(r) {
    const m = r.metrics;
    const sevAlert = m.severity === 'critical';
    const sevExtra = sevAlert ? 'alert' : (r.rid === 'dd1f5400' ? 'featured' : '');
    const lat = fmtMs(m.latency_ms);
    const latParts = lat.split(' ');
    return [
      el('div', { class: `kpi ${sevExtra}` }, [
        el('div', { class: 'kpi-label' }, 'Severity'),
        el('div', { class: 'kpi-value', style: 'font-style:italic; font-size:32px;' }, m.severity),
        el('div', { class: 'kpi-foot' }, sevAlert ? 'falso positivo — corrigido' : 'output do agente'),
      ]),
      el('div', { class: 'kpi' }, [
        el('div', { class: 'kpi-label' }, 'Divergences'),
        el('div', { class: 'kpi-value' }, String(m.divergences)),
        el('div', { class: 'kpi-foot' }, `${m.classifications} classified`),
      ]),
      el('div', { class: 'kpi' }, [
        el('div', { class: 'kpi-label' }, 'Latency'),
        el('div', { class: 'kpi-value' }, [latParts[0], el('span', { class: 'unit' }, latParts[1] || '')]),
        el('div', { class: 'kpi-foot' }, 'wall clock total'),
      ]),
      el('div', { class: 'kpi' }, [
        el('div', { class: 'kpi-label' }, 'LLM calls'),
        el('div', { class: 'kpi-value' }, String(m.llm_calls)),
        el('div', { class: 'kpi-foot' }, m.tool_calls != null ? `${m.tool_calls} tool calls` : 'pre-cap'),
      ]),
      el('div', { class: 'kpi' }, [
        el('div', { class: 'kpi-label' }, 'Cost'),
        el('div', { class: 'kpi-value' }, [
          '$', el('span', {}, m.cost_usd != null ? m.cost_usd.toFixed(4) : '—'),
        ]),
        el('div', { class: 'kpi-foot' }, m.tokens_in != null ? `${(m.tokens_in/1000).toFixed(1)}k in · ${(m.tokens_out/1000).toFixed(1)}k out` : 'sem dados'),
      ]),
    ];
  }

  function renderPane(rid) {
    const r = DATA.runs.find((x) => x.rid === rid);
    if (!r) return;
    const m = r.metrics;
    const pane = document.getElementById('pane');
    clear(pane);

    pane.appendChild(el('div', { class: 'pane-head' }, [
      el('div', {}, [
        el('div', { class: 'pane-eyebrow' }, `${r.stage_label} · ${r.stage_desc}`),
        el('h1', { class: 'pane-title' }, ['Run', el('span', { class: 'rid' }, `/ ${r.rid}`)]),
        el('div', { class: 'pane-sub' }, [
          el('span', { class: 'val' }, r.full_id),
          el('span', { class: 'sep' }, '·'),
          'severity ',
          el('span', { class: 'val phos' }, m.severity),
        ]),
      ]),
      el('div', { class: 'pane-head-right' }, [
        'EXECUTED', el('div', { class: 'when' }, fmtDate(r.ts)),
      ]),
    ]));

    pane.appendChild(el('div', { class: 'kpis' }, buildKpis(r)));

    pane.appendChild(el('div', { class: 'panel' }, [
      el('div', { class: 'panel-head' }, [
        el('div', { class: 'title' }, 'Trace do agente'),
        el('div', { class: 'meta' }, `${r.trace.length} steps · clique para expandir thinking + I/O`),
      ]),
      el('div', { class: 'panel-body' }, [buildTrace(r.trace)]),
    ]));

    pane.appendChild(el('div', { class: 'panel' }, [
      el('div', { class: 'panel-head' }, [
        el('div', { class: 'title' }, 'Divergências detectadas'),
        el('div', { class: 'meta' }, `${m.divergences} achados`),
      ]),
      el('div', { class: 'panel-body flush' }, [buildDivTable(r.divergences)]),
    ]));

    pane.appendChild(el('div', { class: 'panel' }, [
      el('div', { class: 'panel-head' }, [
        el('div', { class: 'title' }, 'Rationale'),
        el('div', { class: 'meta' }, r.rationale ? 'output literal do agente' : 'não disponível'),
      ]),
      el('div', { class: 'panel-body' }, [buildRationale(r.rationale)]),
    ]));

    document.querySelectorAll('.run-item').forEach((a) => {
      a.classList.toggle('active', a.dataset.rid === rid);
    });
    pane.scrollTop = 0;
  }

  function selectRun(rid) {
    renderPane(rid);
    history.replaceState(null, '', `#${rid}`);
  }

  renderRuns();
  const initial = window.location.hash.replace('#', '') || 'dd1f5400';
  selectRun(initial);

  const tt = document.getElementById('themeToggle');
  tt.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    tt.textContent = next === 'light' ? '☾ DARK' : '☼ LIGHT';
  });
})();
</script>
