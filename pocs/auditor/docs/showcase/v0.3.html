<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auditor v0.3 :: Trace Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Geist+Mono:wght@300..700&family=Inter:wght@300..600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --void: #0c0d10;
    --surface: #15161a;
    --surface-2: #1c1d22;
    --bone: #e8e6e1;
    --steel: #8a8d93;
    --steel-dim: #5a5d63;
    --phosphor: #c5f04a;
    --phosphor-dim: #7d9a2a;
    --phosphor-tint: rgba(197,240,74,0.06);
    --phosphor-glow: rgba(197,240,74,0.18);
    --carmim: #a3231a;
    --carmim-tint: rgba(163,35,26,0.12);
    --amber: #d4a015;
    --amber-tint: rgba(212,160,21,0.12);
    --rule: #2a2c30;
    --rule-soft: #1f2024;
    --mono: 'Geist Mono', ui-monospace, monospace;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  [data-theme="light"] {
    color-scheme: light;
    --void: #f5f2eb;
    --surface: #ece8de;
    --surface-2: #e2ddd0;
    --bone: #1a1b1f;
    --steel: #5a5d63;
    --steel-dim: #9a9ea4;
    --phosphor: #4a6710;
    --phosphor-dim: #6b8a20;
    --phosphor-tint: rgba(74,103,16,0.07);
    --phosphor-glow: rgba(74,103,16,0.2);
    --carmim: #8b1d15;
    --carmim-tint: rgba(139,29,21,0.14);
    --amber: #946d00;
    --amber-tint: rgba(148,109,0,0.14);
    --rule: #d4cfc2;
    --rule-soft: #dfdac9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--void); color: var(--bone); height: 100%; }
  body {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
  .app-body { display: grid; grid-template-columns: 320px 1fr; min-height: 0; }

  header.top {
    border-bottom: 1px solid var(--rule);
    background: var(--void);
    display: flex; align-items: center;
    padding: 0 24px; gap: 32px;
    position: relative; z-index: 10;
  }
  .brand {
    font-family: var(--mono); font-size: 15px; font-weight: 500;
    color: var(--bone); letter-spacing: -0.01em;
    display: inline-flex; align-items: baseline;
  }
  .brand .caret { color: var(--phosphor); margin-right: 4px; }
  .brand .uscore {
    display: inline-block; width: 9px; height: 14px;
    background: var(--phosphor); margin-left: 2px;
    animation: blink 1.1s steps(2, start) infinite;
    vertical-align: -2px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .crumbs {
    font-family: var(--mono); font-size: 12px; color: var(--steel);
    display: flex; gap: 16px; align-items: center;
  }
  .crumbs .sep { color: var(--steel-dim); }
  .crumbs .now { color: var(--bone); }
  .top-right {
    margin-left: auto; display: flex; gap: 18px; align-items: center;
    font-family: var(--mono); font-size: 11px; color: var(--steel);
    letter-spacing: 0.04em;
  }
  .top-right .stat { display: flex; align-items: baseline; gap: 8px; }
  .top-right .stat b { font-weight: 500; color: var(--bone); font-variant-numeric: tabular-nums; }
  .top-right .live-dot {
    width: 6px; height: 6px; background: var(--phosphor);
    border-radius: 50%; box-shadow: 0 0 8px var(--phosphor-glow);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  .theme-toggle {
    background: transparent; border: 1px solid var(--rule);
    color: var(--bone); padding: 4px 10px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.08em; cursor: pointer;
    transition: border-color 150ms, color 150ms;
  }
  .theme-toggle:hover { border-color: var(--phosphor); color: var(--phosphor); }

  aside.runs {
    border-right: 1px solid var(--rule); background: var(--void);
    overflow-y: auto; min-height: 0;
  }
  .runs-head {
    padding: 20px 22px 12px; font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--steel);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .runs-head .count { color: var(--phosphor); font-weight: 500; }
  .runs-list { padding: 0 0 24px; }
  .run-item {
    display: block; padding: 14px 22px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 150ms, border-color 150ms;
  }
  .run-item:hover { background: var(--surface); }
  .run-item.active { background: var(--surface); border-left-color: var(--phosphor); }
  .run-item .row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .run-item .stage-tag {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;
    color: var(--phosphor); font-weight: 600;
  }
  .run-item .sev {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;
    padding: 2px 6px; border: 1px solid currentColor; text-transform: uppercase;
  }
  .run-item .sev.info { color: var(--phosphor-dim); }
  .run-item .sev.critical { color: var(--carmim); background: var(--carmim-tint); }
  .run-item .sev.warn { color: var(--amber); background: var(--amber-tint); }
  .run-item .rid {
    font-family: var(--mono); font-size: 13px; color: var(--bone);
    margin-bottom: 4px; letter-spacing: -0.01em;
  }
  .run-item.active .rid { color: var(--phosphor); }
  .run-item .desc { font-family: var(--sans); font-size: 11px; color: var(--steel); line-height: 1.45; }
  .run-item .meta {
    margin-top: 8px; font-family: var(--mono); font-size: 10px;
    color: var(--steel-dim); display: flex; gap: 14px; flex-wrap: wrap;
  }
  .run-item .meta span b { color: var(--steel); font-weight: 500; font-variant-numeric: tabular-nums; }
  .run-section-label {
    padding: 18px 22px 6px; font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.22em; color: var(--steel-dim); text-transform: uppercase;
    border-top: 1px solid var(--rule-soft); margin-top: 4px;
  }

  main.pane { overflow-y: auto; min-height: 0; padding: 32px 40px 80px; background: var(--void); }
  .pane-head {
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
    padding-bottom: 24px; border-bottom: 1px solid var(--rule); margin-bottom: 32px;
  }
  .pane-eyebrow {
    font-family: var(--mono); font-size: 11px; color: var(--phosphor);
    letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 8px;
  }
  .pane-title {
    font-family: var(--serif); font-weight: 400; font-style: italic;
    font-size: 42px; letter-spacing: -0.02em; line-height: 1; color: var(--bone);
  }
  .pane-title .rid {
    font-family: var(--mono); font-style: normal; font-size: 22px;
    color: var(--steel); margin-left: 14px; letter-spacing: 0; font-weight: 400;
  }
  .pane-sub { margin-top: 12px; font-family: var(--mono); font-size: 12px; color: var(--steel); }
  .pane-sub .sep { color: var(--steel-dim); margin: 0 8px; }
  .pane-sub .val { color: var(--bone); }
  .pane-sub .val.phos { color: var(--phosphor); }
  .pane-head-right {
    text-align: right; font-family: var(--mono); font-size: 11px;
    color: var(--steel); letter-spacing: 0.08em;
  }
  .pane-head-right .when { color: var(--bone); margin-top: 6px; font-size: 13px; }

  .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 32px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--rule);
    padding: 18px 20px; position: relative; overflow: hidden;
  }
  .kpi-label {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.18em; color: var(--steel); margin-bottom: 12px;
  }
  .kpi-value {
    font-family: var(--serif); font-weight: 300; font-size: 40px;
    line-height: 1; color: var(--bone); letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .kpi-value .unit { font-size: 14px; color: var(--steel); margin-left: 4px; font-weight: 400; }
  .kpi-foot { margin-top: 10px; font-family: var(--mono); font-size: 10px; color: var(--steel-dim); letter-spacing: 0.04em; }
  .kpi.featured { background: var(--phosphor-tint); border-color: var(--phosphor-dim); }
  .kpi.featured .kpi-label { color: var(--phosphor); }
  .kpi.alert { border-color: var(--carmim); background: var(--carmim-tint); }
  .kpi.alert .kpi-label, .kpi.alert .kpi-value { color: var(--carmim); }

  .panel {
    background: var(--surface); border: 1px solid var(--rule);
    margin-bottom: 24px; overflow: hidden;
  }
  .panel-head {
    padding: 14px 22px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--rule); background: var(--surface-2);
  }
  .panel-head .title {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.2em; color: var(--bone);
    display: flex; align-items: center; gap: 10px;
  }
  .panel-head .title::before {
    content: ''; width: 8px; height: 8px; background: var(--phosphor);
    box-shadow: 0 0 6px var(--phosphor-glow);
  }
  .panel-head .meta { font-family: var(--mono); font-size: 11px; color: var(--steel); }
  .panel-body { padding: 16px 22px 22px; }
  .panel-body.flush { padding: 0 0 4px; }

  /* === Trace timeline === */
  .trace { display: flex; flex-direction: column; }
  .thinking-block {
    margin: 8px 0 14px;
    padding: 12px 16px 12px 18px;
    background: var(--surface-2);
    border-left: 2px solid var(--phosphor-dim);
    font-family: var(--serif); font-style: italic;
    font-size: 13px; line-height: 1.6; color: var(--steel);
    white-space: pre-wrap; word-wrap: break-word;
  }
  .thinking-block::before {
    content: '« thinking';
    font-family: var(--mono); font-style: normal;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--phosphor-dim); display: block; margin-bottom: 6px;
    text-transform: uppercase;
  }
  .step {
    background: var(--surface);
    border: 1px solid var(--rule);
    margin-bottom: 8px;
  }
  .step-head {
    display: grid;
    grid-template-columns: 36px 200px 1fr 80px;
    gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    align-items: center;
    user-select: none;
    transition: background 150ms;
  }
  .step-head:hover { background: var(--surface-2); }
  .step.open .step-head { background: var(--surface-2); border-bottom: 1px solid var(--rule); }
  .step-idx {
    font-family: var(--mono); font-size: 10px;
    color: var(--steel-dim); font-variant-numeric: tabular-nums;
  }
  .step-tool {
    font-family: var(--mono); font-size: 12px;
    color: var(--bone); font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .step-tool .dot {
    width: 8px; height: 8px; background: var(--steel);
    flex-shrink: 0;
  }
  .step.tool-read .dot,
  .step.tool-write .dot,
  .step.tool-read_r2 .dot,
  .step.tool-bash .dot { background: var(--steel); }
  .step.tool-get_checkpoint .dot { background: var(--steel-dim); }
  .step.tool-query_decision_log .dot { background: var(--phosphor-dim); }
  .step.tool-detect_divergences .dot { background: var(--phosphor); }
  .step.tool-classify_origin .dot { background: var(--bone); }
  .step.tool-suggest_adjustment .dot { background: var(--amber); }
  .step.tool-summarize_patterns .dot { background: var(--phosphor); box-shadow: 0 0 4px var(--phosphor-glow); }
  .step-tool .kind-tag {
    font-size: 9px; color: var(--phosphor-dim);
    border: 1px solid var(--phosphor-dim);
    padding: 1px 5px; letter-spacing: 0.1em; text-transform: uppercase;
    margin-left: 4px;
  }
  .step-preview {
    font-family: var(--mono); font-size: 11px;
    color: var(--steel); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .step-meta {
    font-family: var(--mono); font-size: 10px;
    color: var(--steel-dim); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .step-body { display: none; padding: 16px 18px 18px; }
  .step.open .step-body { display: block; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--steel-dim); margin-bottom: 6px;
  }
  .field-label.input { color: var(--phosphor-dim); }
  .field-label.result { color: var(--steel); }
  .field-content {
    font-family: var(--mono); font-size: 11.5px; line-height: 1.55;
    background: var(--void); border: 1px solid var(--rule-soft);
    padding: 12px 14px; color: var(--bone);
    white-space: pre-wrap; word-wrap: break-word;
    max-height: 360px; overflow-y: auto;
  }
  .field-content.empty {
    color: var(--steel-dim); font-style: italic; font-family: var(--serif);
    border-style: dashed;
  }
  .children {
    border-top: 1px solid var(--rule);
    background: var(--rule-soft);
    padding: 10px 14px 8px 18px;
    margin-top: 0;
  }
  .children .children-label {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--phosphor-dim); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .children .children-label::before {
    content: ''; width: 10px; height: 1px; background: var(--phosphor-dim);
  }
  .children .step { background: var(--surface); margin-bottom: 6px; }
  .children .step-head {
    grid-template-columns: 30px 180px 1fr 70px;
    padding: 10px 14px;
  }
  .children .step-idx { font-size: 9px; }
  .children .step-tool { font-size: 11px; }
  .children .step-preview { font-size: 10px; }
  .children .step-meta { font-size: 9px; }

  /* === Divergências table (kept) === */
  table.tbl {
    width: 100%; border-collapse: collapse;
    font-family: var(--mono); font-size: 12px;
  }
  table.tbl th, table.tbl td {
    padding: 11px 14px; text-align: left;
    border-bottom: 1px solid var(--rule); vertical-align: top;
  }
  table.tbl th {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--steel); font-weight: 500;
    padding-top: 6px; padding-bottom: 8px; background: var(--surface-2);
  }
  table.tbl tr:last-child td { border-bottom: 0; }
  table.tbl .bucket { color: var(--phosphor); white-space: nowrap; }
  table.tbl .heur {
    font-family: var(--serif); font-style: italic;
    font-size: 13px; color: var(--bone);
  }
  table.tbl .ev {
    color: var(--steel); font-style: italic;
    max-width: 360px; line-height: 1.5;
  }
  table.tbl .target {
    font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; border: 1px solid currentColor;
    text-transform: uppercase; letter-spacing: 0.1em;
    display: inline-block;
    color: var(--phosphor); background: var(--phosphor-tint);
  }
  table.tbl .target.criteriofaltando { color: var(--amber); border-color: var(--amber); background: var(--amber-tint); }
  table.tbl .sev-pill {
    display: inline-block; padding: 2px 6px; font-size: 9px;
    border: 1px solid currentColor; color: var(--bone);
    text-transform: uppercase; letter-spacing: 0.12em;
  }
  table.tbl .empty td {
    text-align: center; color: var(--steel-dim); padding: 28px;
    font-style: italic; font-family: var(--serif); font-size: 14px;
  }

  .rationale {
    background: var(--void); border: 1px solid var(--phosphor-dim);
    padding: 22px 24px; position: relative;
    font-family: var(--mono); font-size: 12.5px; line-height: 1.7;
    color: var(--bone); white-space: pre-wrap;
  }
  .rationale::before {
    content: 'AGENT.RATIONALE'; position: absolute; top: -9px; left: 16px;
    background: var(--phosphor); color: var(--void);
    padding: 2px 10px; font-size: 10px; letter-spacing: 0.2em; font-weight: 700;
  }
  .rationale.missing {
    border-color: var(--rule); background: var(--surface); color: var(--steel);
    text-align: center; font-style: italic;
    font-family: var(--serif); font-size: 14px; padding: 28px;
  }
  .rationale.missing::before { display: none; }

  @media (max-width: 1100px) {
    .kpis { grid-template-columns: repeat(3, 1fr); }
    .app-body { grid-template-columns: 280px 1fr; }
    .step-head { grid-template-columns: 30px 180px 1fr 70px; }
  }
  @media (max-width: 800px) {
    .app-body { grid-template-columns: 1fr; }
    aside.runs { display: none; }
    .kpis { grid-template-columns: repeat(2, 1fr); }
    main.pane { padding: 20px 18px 40px; }
    .pane-title { font-size: 28px; }
    .step-head { grid-template-columns: 26px 1fr 70px; }
    .step-preview { display: none; }
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); }
  ::-webkit-scrollbar-thumb:hover { background: var(--steel-dim); }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <a class="brand" href="#">
      <span class="caret">&gt;</span>auditor<span class="uscore"></span>
    </a>
    <div class="crumbs">
      <span>poc-flue</span><span class="sep">/</span>
      <span>auditor</span><span class="sep">/</span>
      <span class="now">v0.3 trace dashboard</span>
    </div>
    <div class="top-right">
      <div class="stat"><span class="live-dot"></span> 6 runs · stage 1—4</div>
      <button class="theme-toggle" id="themeToggle">☼ LIGHT</button>
    </div>
  </header>

  <div class="app-body">
    <aside class="runs">
      <div class="runs-head">
        <span>Field Runs</span>
        <span class="count">6</span>
      </div>
      <div class="runs-list" id="runsList"></div>
    </aside>
    <main class="pane" id="pane"></main>
  </div>

ntexto-momento.md` antes de classificar/sugerir. Não os carregue por padrão — chame só quando precisar.\n- `query_decision_log(sql, hipotese)` — SELECT em `decision_log`/`lead`. Cap 15 queries/run, 100 rows/query. **É assim que você descobre os candidatos no Stage 4** — não há lista inline.\n- `detect_divergences`, `classify_origin`, `suggest_adjustment`, `summarize_patterns` — mesmas skills do Stage 3.\n\n## Pipeline default sugerido\n\nEsta é uma sequência sensata pra começar. Você pode (e deve) divergir se a primeira query indicar padrão diferente.\n\n1. **Janela**: `get_checkpoint()` → `fromTs = last_processed_ts` (ou `now - 6h` se nunca rodou). `toTs = now`.\n2. **Filtro de candidatos**: query D1 com `WHERE agent_id = ? AND ts > ? AND ts <= ? AND (has_out_of_scope = 1 OR (judgment_outcome='descartar' AND objective_tier='A') OR (judgment_outcome='priorizar' AND objective_tier='C'))`.\n3. **Bucketing**: agrupe por `(judgment_outcome, objective_tier, has_out_of_scope)`. Buckets \"tranquilos\" (priorizar/A/0, manter/B/0, descartar/C/0) pulam.\n4. **Min sample**: bucket precisa de ≥5 decisões pra entrar — abaixo disso, vira ruído.\n5. **Escolha de representantes**: pra cada bucket ativo, escolha até 3 com a skill `choose-representatives` (auto-injetada). Chame `detect_divergences(decision_id)` em cada.\n6. **Classify + suggest**: pra cada divergência única (dedup por `heuristic_ignored × bucket_key`), `classify_origin` → `suggest_adjustment` se target ≠ inconclusive.\n7. **Investigação cross-janela**: 1-3 queries via `query_decision_log` pra validar tendência (regressão, oos growth, cross-bucket). Consulte `investigate-data` pra schema + queries prontas.\n8. **Summarize**: `summarize_patterns(divergences)` → output final.\n\nDetalhes literais do pipeline (incluindo SQL exato e checagens) em `.agents/skills/compose-audit-run/references/fluxo-default.md`.\n\n## Quando vale divergir do default\n\nO default não é regra — é baseline. Se ao olhar os dados via query inicial você notar:\n\n- **Anomalia fora dos buckets de flip**: ex. 80% das decisões em `manter/B/0` (bucket \"tranquilo\") com reasoning citando heurístico nunca visto antes → vale investigar mesmo sendo tranquilo.\n- **Volume insuficiente nos buckets de flip**: nenhum bucket atinge min sample 5 → considere baixar pra 3 com `confidence: low` em todas as classificações.\n- **Janela vazia**: query inicial retorna 0 candidatos no filtro padrão → expanda a janela (até 24h) antes de declarar `no-candidates`.\n- **Padrão de cost/latency atípico**: query agregada de `cost_usd`/`duration_ms` mostra outlier de >3× a mediana → investiga independente do bucket.\n\nSinais detalhados em `.agents/skills/compose-audit-run/references/quando-divergir-do-default.md`.\n\n## Severity (você define, monitor age)\n\nO monitor lê o `severity` que você devolve no output e decide PR/Telegram. Critérios:\n\n- **`critical`**: `cross_bucket_signal != null` E (≥20 decisões na agregação cross-bucket via query) E (reasoning variado, não template) E (afeta ≥2 buckets estruturalmente distintos). Promove apenas com evidência sólida — falso positivo crítico custa muito mais que negativo. Detalhes em `investigate-data` \"Antes de promover a cross_bucket_signal\".\n- **`warn`**: pattern com `promotion_recommendation: finding` E `confidence ≥ med` E afeta ≥2 buckets, mas sem ≥20 decisões cross-bucket. PR criado, Telegram silencioso.\n- **`info`**: qualquer outra coisa (incluindo: divergências detectadas mas isoladas, confidence low, amostra pequena). Sem PR. Sem Telegram.\n- **`none`**: nenhum candidato após filtro/investigação. Apenas atualiza checkpoint.\n\n## Princípios não-negociáveis\n\n- **Hipótese antes de query**: nunca rode SQL sem escrever 1 linha do que qu", "elapsed_ms": 0, "children": []}, {"tool": "get_checkpoint", "thinking": null, "input_preview": "", "input_full": "", "result_preview": "{\"agent_id\":\"3d893b4530273633\",\"last_processed_ts\":1778627450417,\"now\":1778632201193}", "result_full": "{\"agent_id\":\"3d893b4530273633\",\"last_processed_ts\":1778627450417,\"now\":1778632201193}", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": "Let me read the detailed references for the default pipeline and divergence criteria, then run the initial query.", "input_preview": "{ \"path\": \".agents/skills/compose-audit-run/references/fluxo-default.md\" }", "input_full": "{\n  \"path\": \".agents/skills/compose-audit-run/references/fluxo-default.md\"\n}", "result_preview": "# Pipeline default — passo a passo Sequência sensata pra começar. Cada passo lista as tools envolvidas e o SQL literal quando aplicável. ## Passo 0 — Setup Você não precisa de input do prompt principal. Tudo vem de tools. ## Passo 1 — Janela temporal Chame `get_checkpoint()`. Retorna: ```json { \"agent_id\": \"<hash hmac …", "result_full": "# Pipeline default — passo a passo\n\nSequência sensata pra começar. Cada passo lista as tools envolvidas e o SQL literal quando aplicável.\n\n## Passo 0 — Setup\n\nVocê não precisa de input do prompt principal. Tudo vem de tools.\n\n## Passo 1 — Janela temporal\n\nChame `get_checkpoint()`. Retorna:\n\n```json\n{\n  \"agent_id\": \"<hash hmac do qualificador>\",\n  \"last_processed_ts\": <number|null>,\n  \"now\": <number>\n}\n```\n\n- Se `last_processed_ts` existe: `fromTs = last_processed_ts`.\n- Se é `null` (primeiro run): `fromTs = now - 6 * 3600 * 1000`.\n- `toTs = now`.\n\n**Anote**: o `from_ts` e `to_ts` que você escolheu vão pro output final.\n\n## Passo 2 — Filtro de candidatos\n\nQuery default (substitua `?` pelos valores reais):\n\n```sql\nSELECT\n  decision_log.id, decision_log.did, decision_log.reasoned, decision_log.out_of_scope,\n  decision_log.objective_tier, decision_log.judgment_outcome, decision_log.has_out_of_scope,\n  decision_log.cost_usd, decision_log.duration_ms,\n  lead.id AS lead_id, lead.segmento, lead.faturamento_band, lead.time_vendas,\n  lead.ferramentas, lead.sinal, lead.fundador_tecnico, lead.menciona_dor,\n  lead.contexto_livre_sanitized\nFROM decision_log\nLEFT JOIN lead ON decision_log.lead_id = lead.id\nWHERE decision_log.agent_id = '<agent_id>'\n  AND decision_log.ts > <fromTs>\n  AND decision_log.ts <= <toTs>\n  AND (\n    decision_log.has_out_of_scope = 1\n    OR (decision_log.judgment_outcome = 'descartar' AND decision_log.objective_tier = 'A')\n    OR (decision_log.judgment_outcome = 'priorizar' AND decision_log.objective_tier = 'C')\n  )\nLIMIT 100\n```\n\nHipótese a registrar: \"puxar candidatos suspeitos da janela (flip contra tier + out_of_scope) pra auditoria\".\n\n- Se retornou 0 rows: **expanda janela pra `now - 24h`** antes de declarar `no-candidates`.\n- Se retornou >50 rows: você está saturando o `LIMIT 100`. Considere apertar o filtro (ex. excluir `has_out_of_scope=1` em decisões `priorizar/A` que provavelmente são ruído).\n\n## Passo 3 — Bucketing\n\nAgrupe em memória por `(judgment_outcome, objective_tier, has_out_of_scope)`. Buckets \"tranquilos\" pulam:\n\n- `priorizar/A/0` (esperado — tier A com flag limpa)\n- `manter/B/0` (esperado — tier B com flag limpa)\n- `descartar/C/0` (esperado — tier C com flag limpa)\n\nBuckets restantes são \"ativos\". Min sample = 5 decisões por bucket (regra default — pode flexibilizar pra 3 se nenhum bucket atinge 5, mas marque `confidence: low`).\n\n## Passo 4 — Sample por bucket\n\nPra cada bucket ativo, escolha até 3 representantes via skill `choose-representatives` (auto-injetada). Critérios resumidos:\n\n1. Triage por divergência aparente: flip contra tier, justificativa subjetiva sem heurístico, contradição interna, OOS suspeito.\n2. Se há ≥1 suspeita, prefira suspeitas.\n3. Desempate por diversidade de lead.\n\nPra cada escolhido, chame `detect_divergences(decision_id)`.\n\n## Passo 5 — Classify + suggest\n\nDedup primeiro: agrupe divergências por `(heuristic_ignored, bucket_key)`. Uma classificação por par único.\n\nPra cada divergência única, chame em sequência:\n\n1. `classify_origin(decision_id, bucket_key, heuristic_ignored, evidence, severity)`\n2. Se `target != \"inconclusive\"`: `suggest_adjustment(decision_id, bucket_key, heuristic_ignored, evidence, severity, target)`\n\n## Passo 6 — Investigação cross-janela (1-3 queries)\n\nAntes do summarize, valide com queries D1. Consulte a skill `investigate-data` pra schema completo e queries prontas. Sugestões:\n\n- **Regressão de tier A descartado**: comparar `% descartar/A` na janela atual vs anterior do mesmo tamanho.\n- **OOS growth**: comparar `% has_out_of_scope=1` cross-janela.\n- **Cross-bucket do heurístico mais comum**: se H_x apareceu ignorado em 2 buckets, confirmar via query se aparece em mais.\n\nCada query precisa de `hipotese` (string). Sem hipótese, tool rejeita.\n\n## Passo 7 — Summarize\n\nChame `summarize_patterns(divergences)` passando o array deduplicado. A skill retorna:\n\n```json\n{\n  \"patterns\": [\n    {\n      \"type\": \"mechanism-divergence\" | ...,\n      \"description\": \"...\",\n      \"affected_buckets\": [...],\n      \"inferred_decisions\": N,\n      \"confidence\": \"high\"|\"med\"|\"low\",\n      \"promotion_recommendation\": \"finding\"|\"wait\"|\"discard\"\n    }\n  ],\n  \"cross_bucket_signal\": <string|null>\n}\n```\n\n## Passo 8 — Severity\n\nAplique a regra do SKILL.md principal:\n\n- `critical` apenas com `cross_bucket_signal != null` E ≥20 decisões agregadas via query E ≥2 buckets E reasoning variado.\n- `warn` se há `promotion_recommendation: finding` com `confidence ≥ med` em ≥2 buckets.\n- `info` no resto.\n- `none` se 0 candidatos.\n\n## Passo 9 — Output\n\nDevolva o objeto final no schema. Inclua `from_ts`, `to_ts`, `candidates_scanned` (rows da query do passo 2), `buckets_active` (count após filtro de min sample), `divergences`, `classifications`, `patterns`, `cross_bucket_signal`, `severity`, e `rationale` curto.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \".agents/skills/compose-audit-run/references/quando-divergir-do-default.md\" }", "input_full": "{\n  \"path\": \".agents/skills/compose-audit-run/references/quando-divergir-do-default.md\"\n}", "result_preview": "# Quando divergir do default O pipeline default cobre o caso \"auditar suspeitas de flip + OOS\". Mas há sinais que justificam outro recorte. Sempre que divergir, registre o motivo em `output.rationale` (1-2 frases) — é assim que humano entende sua escolha. ## Sinal 1 — Janela vazia no filtro padrão **Observação**: query…", "result_full": "# Quando divergir do default\n\nO pipeline default cobre o caso \"auditar suspeitas de flip + OOS\". Mas há sinais que justificam outro recorte. Sempre que divergir, registre o motivo em `output.rationale` (1-2 frases) — é assim que humano entende sua escolha.\n\n## Sinal 1 — Janela vazia no filtro padrão\n\n**Observação**: query do passo 2 retorna 0 rows.\n\n**Ação**: NÃO devolva `no-candidates` imediatamente. Expanda a janela em ordem:\n\n1. `fromTs = now - 24 * 3600 * 1000` (24h, em vez de 6h ou último checkpoint).\n2. Se ainda 0 rows: relax o filtro — drope `(descartar AND tier='A')` ou `(priorizar AND tier='C')` e fique só com `has_out_of_scope=1`.\n3. Se ainda 0 rows: aceite `none` e devolva `severity: \"none\"`.\n\nAnote `rationale: \"janela vazia em filtro padrão; expandi pra 24h e ainda assim 0 candidatos\"`.\n\n## Sinal 2 — Nenhum bucket atinge min sample 5\n\n**Observação**: você tem candidatos mas nenhum bucket tem ≥5 decisões.\n\n**Ação**: rode com min sample = 3 mas marque toda classificação resultante como `confidence: low` no pattern, e use linguagem de hipótese (`\"indica padrão a confirmar\"`, não `\"padrão sistêmico\"`). NÃO promova `cross_bucket_signal`.\n\nRationale: `\"buckets pequenos (max=N decisões); baixei min sample pra 3 com confidence: low em todas as patterns\"`.\n\n## Sinal 3 — Saturando LIMIT 100\n\n**Observação**: query do passo 2 retorna 100 rows (LIMIT atingido). Você não viu o universo completo.\n\n**Ação**: aperte o filtro com hipótese específica. Exemplos:\n\n- Excluir buckets já saturados de OOS: `AND NOT (has_out_of_scope = 1 AND judgment_outcome = 'manter')`.\n- Filtrar pelos `out_of_scope` reasoning textuais mais comuns: rode 1 query agregada antes pra ver os top 3 textos de `out_of_scope` e exclua os \"OK\" conhecidos.\n\nRationale: `\"100 rows no filtro inicial — restringi pra buckets de flip puro pra evitar dispersão de cap\"`.\n\n## Sinal 4 — Anomalia em bucket \"tranquilo\"\n\n**Observação**: durante a query inicial você nota >70% das decisões em `priorizar/A/0` (esperado/tranquilo) com `reasoned` curtíssimo (< 30 chars) ou citando heurístico inexistente no gabarito.\n\n**Ação**: trate como bucket ativo extraordinário. Faça query específica:\n\n```sql\nSELECT id, reasoned, lead_id\nFROM decision_log\nWHERE agent_id = ? AND ts > ? AND ts <= ?\n  AND judgment_outcome = 'priorizar' AND objective_tier = 'A' AND has_out_of_scope = 0\n  AND LENGTH(reasoned) < 30\nLIMIT 30\n```\n\nAplique `detect_divergences` em alguns. Patterns desse bucket vão pra `patterns[]` com `description` explicitando \"encontrado fora dos buckets de flip — sinal de erosão em decisão de baseline\".\n\nRationale: `\"detectei anomalia em priorizar/A/0 (bucket tranquilo) — reasoning curto/genérico em >70% das decisões; investiguei como bucket extraordinário\"`.\n\n## Sinal 5 — Outlier de custo/latência\n\n**Observação**: você quer validar se o qualificador degradou em custo. Query agregada:\n\n```sql\nSELECT\n  CASE WHEN ts > ? THEN 'atual' ELSE 'anterior' END AS janela,\n  AVG(cost_usd) AS avg_cost, MAX(cost_usd) AS max_cost,\n  AVG(duration_ms) AS avg_dur, MAX(duration_ms) AS max_dur, COUNT(*) AS n\nFROM decision_log\nWHERE agent_id = ? AND ts > ? AND ts <= ?\nGROUP BY 1\n```\n\nSe `max_cost atual > 3 × max_cost anterior`: emita um pattern `type: \"criterio-faltando\"` com `description` mencionando o blow-out de custo (mesmo que não haja heurístico ignorado — é sinal de regressão de eficiência).\n\nRationale: `\"cust irecta? Wait, the evidence says \"manter porque tier objetivo B → fit médio sem sinal compensatório\". That implies the agent judged there was no strong signal. But the heuristic says if there is a strong signal (demo directa), then prioritize. The divergence says heuristic ignored H4.\n\nWe need to classify origin.\n\nLet's think: Did the agent ignore H4 because the prompt didn't include it? Or because the gabarito is stale? Or because a criterion is missing? Or context changed?\n\nThe gabarito says \"janela de aprendizado\". The contexto_momento says fase is \"Produto em validação (não escala) — coletando feedback técnico, ajustando arquitetura.\" That is a learning window. So H4 seems aligned with contexto_momento. So not gabarito-stale or contexto-mudou.\n\nIs there a missing criterion in the rubrica objetiva? The heuristic H4 is about demo directa + score B. The rubrica objetiva (not fully provided, but we have gabarito). The divergence is about H4 being ignored. It's not a missing criterion from the rubrica; it's a heuristic from the gabarito.\n\nSo likely target is prompt-issue: the agent's prompt didn't carry the heuristic correctly, or the agent failed to apply it. We need to check references for prompt-issue. Let's read the reference.", "input_preview": "{ \"path\": \".agents/skills/classify-origin/references/prompt-issue.md\" }", "input_full": "{\n  \"path\": \".agents/skills/classify-origin/references/prompt-issue.md\"\n}", "result_preview": "# Target: prompt-issue ## Definição precisa `prompt-issue` = **o heurístico existe no gabarito, a condição se aplica ao lead, mas o agente não o invoca**. A falha está no prompt do `qualificar-lead`, que não força citar o heurístico quando deveria. > Default quando o `heuristic_ignored` aparece literal no gabarito. Só …", "result_full": "# Target: prompt-issue\n\n## Definição precisa\n\n`prompt-issue` = **o heurístico existe no gabarito, a condição se aplica ao lead, mas o agente não o invoca**. A falha está no prompt do `qualificar-lead`, que não força citar o heurístico quando deveria.\n\n> Default quando o `heuristic_ignored` aparece literal no gabarito. Só procure outro target se houver evidência clara contra `prompt-issue`.\n\n## Quando aplicar\n\nA condição literal de um heurístico do gabarito se aplica ao lead (verificável nos campos estruturados ou no contexto-livre), mas o `reasoned` do agente não cita o Hx correspondente e justifica a decisão por outro caminho. O gabarito em si está correto e atual — o que falha é a tradução pro prompt do `qualificar-lead`, que não força citar o heurístico quando a condição aplica. Tem que ser sistemático em buckets similares, não caso isolado.\n\n## Sinais positivos\n- O `heuristic_ignored` aparece **literal** no markdown do gabarito (procurar pela sigla Hx ou pela primeira linha da seção)\n- Gabarito está claro e a condição do Hx é objetivamente verificável no input do lead\n- Múltiplos representantes do mesmo bucket (ou buckets adjacentes) ignoram o mesmo Hx\n- O `reasoned` justifica a decisão por tier objetivo ou outro Hx, sem mencionar o ignorado\n- O `contexto_momento` confirma que a fase/capacidade descrita no Hx ainda vale (excluindo `gabarito-stale`)\n\n## Sinais que NÃO indicam prompt-issue (anti-patterns)\n- Heurístico aparece ignorado em 1 caso isolado → `inconclusive` (provável ruído)\n- O `reasoned` articula uma versão mais nuançada que o gabarito → `gabarito-stale`\n- A condição do Hx depende de contexto-momento defasado (ex: gabarito assume fase X mas `contexto_momento` mostra fase Y) → `contexto-mudou`\n- O fator que aparece no `reasoned` **não tem Hx correspondente no gabarito** → `criterio-faltando`\n\n## Fronteira com targets adjacentes\n| Pista | prompt-issue | Outro target |\n|---|---|---|\n| Hx existe no gabarito, condição aplica, agente não cita | **sim** | — |\n| Hx precisa refinar condição/mecanismo | não | gabarito-stale |\n| Heurístico do `heuristic_ignored` **não aparece** no markdown do gabarito | não | orizar. The agent ignored H6 and descartou because of disengagement.\n\nIs this a prompt issue? The agent didn't apply H6 correctly. But why? \n\nLet me check the contexto_momento. Could the context have changed such that tier A should no longer be the default? The context says:\n- Fase: Produto em validação\n- Capacidade: Time de 3 pessoas, ~20 clientes, enterprise inviável\n- Foco: Infoprodutores brasileiros faturando R$ 50k-500k/mês\n- Hipóteses não validadas: automação de qualificação, decisores técnicos pagariam premium\n\nThere doesn't seem to be any change in context that would make H6 stale. The rubrica objetiva (tier A) would still apply.\n\nWait, I should read the references to be thorough. Let me read the relevant reference files to make the best classification.\n\nActually, looking more carefully:\n- The evidence says \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\"\n- This means the agent consciously decided to discard despite tier A because of disengagement\n\nH6 says: \"só inverter mediante motivo registrado\" - the agent DID register a reason (descomprometimento na call). But is that a valid reason per the gabarito? The gabarito doesn't list disengagement as a valid override. However, the issue might be that the agent improperly applied H6 or that the prompt doesn't make it clear enough that H6 should be respected unless specific heuristics (like H3) trigger.\n\nActually, wait - looking at the decision tree for classify-origin:\n1. prompt-issue: \"O heurístico foi ignorado mas o gabarito está claro e atual?\"\n2. gabarito-stale: heurístico desatualizado em relação ao contexto-momento\n3. criterio-faltando: critério não existe na rubrica objetiva\n4. contexto-mudou: contexto-momento mudou e gabarito reflete estado anterior\n\nLet me think about whether this could be gabarito-stale or contexto-mudou. The contexto_momento says the product is in validation phase, focused on infoprodutores. If a lead is tier A but shows disen erences/prompt-issue.md\"\n}", "result_preview": "# Target: prompt-issue ## Definição precisa `prompt-issue` = **o heurístico existe no gabarito, a condição se aplica ao lead, mas o agente não o invoca**. A falha está no prompt do `qualificar-lead`, que não força citar o heurístico quando deveria. > Default quando o `heuristic_ignored` aparece literal no gabarito. Só …", "result_full": "# Target: prompt-issue\n\n## Definição precisa\n\n`prompt-issue` = **o heurístico existe no gabarito, a condição se aplica ao lead, mas o agente não o invoca**. A falha está no prompt do `qualificar-lead`, que não força citar o heurístico quando deveria.\n\n> Default quando o `heuristic_ignored` aparece literal no gabarito. Só procure outro target se houver evidência clara contra `prompt-issue`.\n\n## Quando aplicar\n\nA condição literal de um heurístico do gabarito se aplica ao lead (verificável nos campos estruturados ou no contexto-livre), mas o `reasoned` do agente não cita o Hx correspondente e justifica a decisão por outro caminho. O gabarito em si está correto e atual — o que falha é a tradução pro prompt do `qualificar-lead`, que não força citar o heurístico quando a condição aplica. Tem que ser sistemático em buckets similares, não caso isolado.\n\n## Sinais positivos\n- O `heuristic_ignored` aparece **literal** no markdown do gabarito (procurar pela sigla Hx ou pela primeira linha da seção)\n- Gabarito está claro e a condição do Hx é objetivamente verificável no input do lead\n- Múltiplos representantes do mesmo bucket (ou buckets adjacentes) ignoram o mesmo Hx\n- O `reasoned` justifica a decisão por tier objetivo ou outro Hx, sem mencionar o ignorado\n- O `contexto_momento` confirma que a fase/capacidade descrita no Hx ainda vale (excluindo `gabarito-stale`)\n\n## Sinais que NÃO indicam prompt-issue (anti-patterns)\n- Heurístico aparece ignorado em 1 caso isolado → `inconclusive` (provável ruído)\n- O `reasoned` articula uma versão mais nuançada que o gabarito → `gabarito-stale`\n- A condição do Hx depende de contexto-momento defasado (ex: gabarito assume fase X mas `contexto_momento` mostra fase Y) → `contexto-mudou`\n- O fator que aparece no `reasoned` **não tem Hx correspondente no gabarito** → `criterio-faltando`\n\n## Fronteira com targets adjacentes\n| Pista | prompt-issue | Outro target |\n|---|---|---|\n| Hx existe no gabarito, condição aplica, agente não cita | **sim** | — |\n| Hx precisa refinar condição/mecanismo | não | gabarito-stale |\n| Heurístico do `heuristic_ignored` **não aparece** no markdown do gabarito | não | criterio-faltando |\n| Capacidade/fase do `contexto_momento` contradiz o reasoned | não | contexto-mudou |\n\n## Worked example 1 — H1 ignorado (caso clássico)\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H1 — Fundador técnico em fase de produto\",\n  \"evidence\": \"lead tem CTO citado no contexto-livre e contexto-momento indica fase de produto; reasoned justifica 'descartar porque tier objetivo C → custo de oportunidade supera valor' sem invocar H1\",\n  \"severity\": \"high\"\n}\n```\n\n**Verificação**:\n- \"H1 — Fundador técnico em fase de produto\" está no gabarito? Sim (procurar `## H1`).\n- Condição aplica? Sim — `lead.fundador_tecnico=1` AND `contexto_momento` em fase de produto.\n- `contexto_momento` ainda diz \"fase de produto\"? Sim — então não é `gabarito-stale` nem `contexto-mudou`.\n\n```json\n{\n  \"target\": \"prompt-issue\",\n  \"rationale\": \"H1 está no gabarito e a condição aplica (fundador técnico + fase de produto confirmada no contexto-momento), mas o reasoned justifica por tier puro sem invocar H1 — falha no prompt do qualificar-lead, que não força citar H1 quando a condição dispara.\"\n}\n```\n\n## Worked example 2 — H6 ignorado (caso do trace pré-refino que estava sendo classificado errado)\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H6 — Default por tier A\",\n  \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\n  \"severity\": \"high\"\n}\n```\n\n**Verificação**:\n- \"H6 — Default por tier A\" está no gabarito? **Sim** (seção `## H6 — Default por tier A` existe).\n- Condição aplica? Sim — tier objetivo é A e nenhum H1..H5 dispara em sentido contrário.\n- `contexto_momento` mudou? Não — H6 é regra de tier, independe de fase.\n\n```json\n{\n  \"target\": \"prompt-issue\",\n  \"rationale\": \"H6 está no gabarito (`## H6 — Default por tier A`) e a condição aplica (tier A sem heurístico contrário disparado). O reasoned inventa critério qualitativo ('descomprometimento na call') ausente do gabarito e contraria a recomendação de priorizar — falha está no prompt do qualificar-lead, que não força citar H6 quando tier=A e nenhum heurístico contrário aparece. Não é `criterio-faltando` porque H6 existe — o que falta é o prompt forçar o uso.\"\n}\n```\n\n**Erro comum a evitar**: classificar este caso como `criterio-faltando` (alvo: `criterios-icp.md`) porque o reasoned menciona \"descomprometimento\" — esse é o fator inventado pelo agente, não a regra do gabarito. O critério ignorado é H6, e H6 existe.\n\n## Limites de escopo\nNão estender pra \"talvez o gabarito também precise melhorar\" — se a divergência é dupla, separar em duas divergências. Aqui só classifica origem.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \".agents/skills/classify-origin/references/gabarito-stale.md\" }", "input_full": "{\n  \"path\": \".agents/skills/classify-origin/references/gabarito-stale.md\"\n}", "result_preview": "# Target: gabarito-stale ## Quando aplicar O heurístico do gabarito (`expected-reasoning/qualificador/fit-estrategico.md`) está fraco: a condição é específica demais (não captura caso recorrente que deveria), genérica demais (dispara sem precisão), ou o mecanismo causal já não bate com a realidade do produto/mercado. O…", "result_full": "# Target: gabarito-stale\n\n## Quando aplicar\nO heurístico do gabarito (`expecte literal no gabarito. Só …", "result_full": "# Target: prompt-issue\n\n## Definição precisa\n\n`prompt-issue` = **o heurístico existe no gabarito, a condição se aplica ao lead, mas o agente não o invoca**. A falha está no prompt do `qualificar-lead`, que não força citar o heurístico quando deveria.\n\n> Default quando o `heuristic_ignored` aparece literal no gabarito. Só procure outro target se houver evidência clara contra `prompt-issue`.\n\n## Quando aplicar\n\nA condição literal de um heurístico do gabarito se aplica ao lead (verificável nos campos estruturados ou no contexto-livre), mas o `reasoned` do agente não cita o Hx correspondente e justifica a decisão por outro caminho. O gabarito em si está correto e atual — o que falha é a tradução pro prompt do `qualificar-lead`, que não força citar o heurístico quando a condição aplica. Tem que ser sistemático em buckets similares, não caso isolado.\n\n## Sinais positivos\n- O `heuristic_ignored` aparece **literal** no markdown do gabarito (procurar pela sigla Hx ou pela primeira linha da seção)\n- Gabarito está claro e a condição do Hx é objetivamente verificável no input do lead\n- Múltiplos representantes do mesmo bucket (ou buckets adjacentes) ignoram o mesmo Hx\n- O `reasoned` justifica a decisão por tier objetivo ou outro Hx, sem mencionar o ignorado\n- O `contexto_momento` confirma que a fase/capacidade descrita no Hx ainda vale (excluindo `gabarito-stale`)\n\n## Sinais que NÃO indicam prompt-issue (anti-patterns)\n- Heurístico aparece ignorado em 1 caso isolado → `inconclusive` (provável ruído)\n- O `reasoned` articula uma versão mais nuançada que o gabarito → `gabarito-stale`\n- A condição do Hx depende de contexto-momento defasado (ex: gabarito assume fase X mas `contexto_momento` mostra fase Y) → `contexto-mudou`\n- O fator que aparece no `reasoned` **não tem Hx correspondente no gabarito** → `criterio-faltando`\n\n## Fronteira com targets adjacentes\n| Pista | prompt-issue | Outro target |\n|---|---|---|\n nput_full": "{\n  \"path\": \".agents/skills/choose-representatives/SKILL.md\"\n}", "result_preview": "--- name: choose-representatives description: Como escolher K representantes pra auditar dentro de um bucket de decisões. Prioriza divergência aparente do gabarito > diversidade de lead > random. NÃO é um tool — é conhecimento ambiente consultado pelo auditor agêntico antes de chamar `detect_divergences`. Se bucket tem…", "result_full": "---\nname: choose-representatives\ndescription: Como escolher K representantes pra auditar dentro de um bucket de decisões. Prioriza divergência aparente do gabarito > diversidade de lead > random. NÃO é um tool — é conhecimento ambiente consultado pelo auditor agêntico antes de chamar `detect_divergences`. Se bucket tem ≤K decisões, audite todas e pule a escolha. Consulte `.agents/skills/choose-representatives/references/` pra padrões linguísticos detalhados.\nmodel: main\n---\n\n# Choose Representatives\n\nVocê está auditando decisões de um agente qualificador. Cada bucket tem N decisões; você só pode pagar o custo de auditar K (cap duro no tool `detect_divergences`). Escolha bem — auditar K decisões aleatórias é desperdício se há sinais óbvios pra priorizar.\n\n## Input mental\n\n- `bucket_key`: identifica o quadrante (judgment/tier/oos) — diz que tipo de viés esperar\n- Lista de decisões com `decision_id`, `reasoned`, `out_of_scope`, `lead`\n- `K`: cap por bucket (geralmente 3)\n\n## Procedimento (em ordem)\n\n### Passo 1 — Triage por sinal de divergência aparente\n\nAntes de tudo, varra o `reasoned` de cada decisão procurando **padrões linguísticos suspeitos**. Sinais fortes:\n\n- **Flip contra tier**: bucket é `descartar/A/*` ou `priorizar/C/*`. Esses são por definição candidatos prioritários — o agent contrariou o score objetivo. Geralmente vale auditar **todos** nesses buckets, mesmo que > K (mas o tool vai cortar em K — escolha os K mais suspeitos).\n- **Justificativa subjetiva sem heurístico**: reasoning cita \"interlocutor sinalizou X\", \"sinal forte de Y\", \"intenção forte\", \"potencial de upside\" sem invocar nenhum heurístico do gabarito (H1, H2, etc.) por sigla ou mecânica.\n- **Contradição interna**: reasoning diz \"menciona dor X\" mas o `lead.menciona_dor === 0`; ou diz \"fundador técnico\" mas `lead.fundador_tecnico === 0`.\n- **OOS texto suspeito**: campo `out_of_scope` com afirmação ampla tipo \"faltou contexto\" mas o `lead.contexto_livre_sanitized` tem texto rico.\n\nMarque as decisões que disparam ≥1 sinal forte como **suspeitas**.\n\n### Passo 2 — Se há suspeitas ≤ K\n\nEscolha **todas** as suspeitas. Completa o restante até K com diversidade (passo 3).\n\n### Passo 3 — Se há suspeitas > K\n\nPegue as K com mais sinais fortes acumulados. Desempate por diversidade de lead (passo 3).\n\n### Passo 4 — Se não há suspeitas\n\nUse diversidade pra escolher K. Maximize variabilidade em (segmento, faturamento_band, time_vendas, fundador_tecnico, menciona_dor):\n\n- Tente cobrir pelo menos 2 segmentos distintos\n- Tente cobrir pelo menos 2 faixas de faturamento\n- Evite 2 reps com mesmo (segmento, faturamento_band, time_vendas)\n\nSe ainda assim houver empate, ordem de inserção (primeiros K do bucket).\n\n## Worked examples\n\n**Exemplo 1 — bucket `descartar/A/0` com 4 decisões, K=3**:\n\nDecisões (resumido):\n- d-A1: reasoned \"descartar — interlocutor sinalizou descomprometimento\", lead={segmento:saas, faturamento:50-500k, fundador_tecnico:1, menciona_dor:1}\n- d-A2: reasoned \"descartar mesmo tier A — sinal forte de baixo engajamento\", lead={segmento:agencia, faturamento:0-50k}\n- d-A3: reasoned \"descartar porque H3 enterprise sem capacidade → manter (contradição: outcome=descartar mas justificativa pede manter)\", lead={faturamento:>5M}\n- d-A4: reasoned \"descartar porque H6 default tier A não se aplica em mid-market\", lead={faturamento:500k-5M}\n\nAnálise:\n- d-A1: suspeita FORTE — justificativa subjetiva (\"descomprometimento\") + ignora H1 (fundador_tecnico=1, menciona_dor=1 ambos disparam priorizar).\n- d-A2: suspeita FORTE — \"sinal forte de baixo engajamento\" não é heurístico do gabarito.\n- d-A3: suspeita FORTE — contradição interna entre justificativa e outcome.\n- d-A4: suspeita MÉDIA — invoca H6 mas inventa restrição \"não se aplica em mid-market\" não no gabarito.\n\nTodas suspeitas, são 4 > K=3. Escolha: d-A1, d-A2, d-A3 (3 sinais fortes claros). Deixa d-A4.\n\n**Exemplo 2 — bucket `priorizar/A/0` com 5 decisões alinhadas, K=3**:\n\nNenhuma decisão suspeita (reasoning cita H1/H2/H6 consistentemente). Use diversidade.\n\nEscolha 3 com leads em segmentos distintos: 1 saas+founder técnico, 1 agência+não técnico, 1 infoprodutor. Cobre 3 segmentos × 3 faturamentos diferentes.\n\n## NÃO FAZER\n\n- Não classifique origem (`prompt-issue` etc.) — isso é skill diferente, vem depois.\n- Não chame `detect_divergences` mais que K vezes por bucket — o tool rejeita.\n- Não escolha apenas a 1ª decisão de cada bucket sem inspecionar — vira sampling random, perde valor do agentic.\n- Não copie o reasoned bruto pro classify; suspeição aqui ≠ divergência confirmada (isso é detect-divergences que decide).\n- Não invente sinais novos sem evidência literal no `reasoned`/`out_of_scope`/`lead`.\n\n## Output\n\nEsta skill **não retorna nada estruturado** — é conhecimento ambiente. Após consultar, simplesmente chame `detect_divergences(decision_id)` nos K escolhidos.\n\nPara padrões linguísticos detalhados de \"justificativa subjetiva\" e \"contradição interna\", leia via `read .agents/skills/choose-represe", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": "Good, I have the skill. Let me also read the detailed reference for sinais-de-divergencia-aparente to make the best choices.", "input_preview": "{ \"path\": \".agents/skills/choose-representatives/references/sinais-de-divergencia-aparente.md\" }", "input_full": "{\n  \"path\": \".agents/skills/choose-representatives/references/sinais-de-divergencia-aparente.md\"\n}", "result_preview": "# Sinais de divergência aparente no `reasoned` Padrões linguísticos que aparecem em decisões onde o agent **provavelmente ignorou ou mal-aplicou** um heurístico do gabarito. NÃO confirmam divergência (essa é tarefa de `detect-divergences`) — apenas indicam que vale auditar. ## Sinais fortes (peso alto na triage) ### 1.…", "result_full": "# Sinais de divergência aparente no `reasoned`\n\nPadrões linguísticos que aparecem em decisões onde o agent **provavelmente ignorou ou mal-aplicou** um heurístico do gabarito. NÃO confirmam divergência (essa é tarefa de `detect-divergences`) — apenas indicam que vale auditar.\n\n## Sinais fortes (peso alto na triage)\n\n### 1. Justificativa subjetiva sem heurístico citado\n\nPadrões: \"interlocutor sinalizou X\", \"sinal forte de Y\", \"interesse aparente\", \"potencial alto\", \"intenção clara\", \"fit baixo compensado por Z\", \"descomprometimento na call\", \"engajamento aparente\".\n\nDiagnóstico: o gabarito é uma lista finita de heurísticos com siglas (H1, H2, ...). Reasoning que decide sem **invocar pelo menos uma sigla ou a mecânica literal de um heurístico** é candidato a violar a rubrica.\n\nExemplo:\n- `reasoned`: \"priorizar porque sinal forte de intenção compensa fit baixo\"\n- Análise: bucket priorizar/C/0. Nenhum heurístico do gabarito autoriza \"sinal forte de intenção\" como compensador. Suspeito de violar H5 (\"tier C sem heurístico compensatório → descartar\").\n\n### 2. Contradição interna entre reasoned e lead\n\nPadrões: reasoning afirma fato sobre o lead que o `lead` snapshot contradiz.\n\nExemplos:\n- reasoning: \"menciona dor específica\" + `lead.menciona_dor === 0` → contradição.\n- reasoning: \"fundador técnico em fase produto\" + `lead.fundador_tecnico === 0` → contradição.\n- reasoning: \"enterprise\" + `lead.faturamento_band === '0-50k'` → contradição.\n\nDiagnóstico: o agent inventou ou mal-leu o lead. Auditoria deve confirmar com `detect-divergences`.\n\n### 3. Contradição entre reasoned e outcome\n\nPadrões: reasoning argumenta em direção X, mas o `judgment_outcome` é direção oposta. Ou o reasoning invoca heurístico que recomenda Y mas decide Z.\n\nExemplos:\n- reasoning: \"H3 enterprise sem capacidade → manter\" + `judgment_outcome: 'descartar'` → contradição.\n- reasoning: \"tier A confere fit estrutural alto\" + `judgment_outcome: 'descartar'` sem heurístico de inversão → contradição.\n\n### 4. Out-of-scope amplo demais\n\nPadrões: `out_of_scope` afirma \"faltou contexto\" / \"faltou dado de X\" mas o `lead.contexto_livre_sanitized` tem texto rico, OU o lead.X tem valor preenchido.\n\nExemplos:\n- `out_of_scope`: \"faltou dado sobre maturidade do time\" + `lead.time_vendas === 'enterprise-time'` (já indica maturidade).\n- `out_of_scope`: \"faltou contexto sobre dor\" + `lead.menciona_dor === 1`.\n\n## Sinais médios (peso moderado)\n\n### 5. Heurístico invocado com restrição inventada\n\nPadrões: reasoning cita Hn mas adiciona condicional que não está no gabarito.\n\nExemplos:\n- reasoning: \"H6 default tier A não se aplica em mid-market\" — gabarito não cria restrição mid-market em H6.\n- reasoning: \"H1 só vale se segmento é saas\" — gabarito não restringe H1 a segmento.\n\n### 6. Empilhamento de sinais sem heurístico mestre\n\nPadrões: reasoning lista 3+ observações qualitativas e conclui sem invocar heurístico explícito.\n\nExemplo:\n- \"priorizar porque demonstra interesse, time pequeno, contexto promissor\" — 3 observações, zero heurísticos. Provavelmente está pulando avaliação rubrica.\n\n## Sinais fracos (peso baixo, só desempate)\n\n### 7. Reasoning muito curto\n\nPadrão: `reasoned` com < 40 caracteres. Pode ser preguiça do agent ou caso trivial.\n\n### 8. Reasoning sem articulação causal X porque Y → Z\n\nPadrão: o projeto convenciona formato \"X porque Y → Z\" pro `reasoned`. Reasoning que não segue isso é candidato a auditar (mas não é divergência por si só).\n\n## Como combinar sinais\n\n- 1 sinal forte: suspeita confirmada, vale auditar.\n- 2+ sinais médios: suspeita, vale auditar.\n- Apenas fracos: depende de diversidade — use só se faltar candidato.\n\nLembre: este passo é **triage**, não diagnóstico. A confirmação vem do `detect_divergences`.\n", "elapsed_ms": 0, "children": []}, {"tool": "detect_divergences", "thinking": "Let me analyze the 5 decisions in bucket `descartar/A/0`:\n\n1. `d-1778627435993-7`: reasoned \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", lead={infoprodutor, 50k-500k, time_vendas:dedicado, crm, demo, fundador_tecnico:0, menciona_dor:0, \"operação tradicional\"}\n   - Signal: Justificativa subjetiva sem heurístico (\"descomprometimento na call\" is subjective). Bucket is descartar/A/0 which is already suspicious.\n   - No fundador técnico, no menciona_dor.\n   \n2. `d-1778627436033-7`: reasoned \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", lead={SaaS B2B, 50k-500k, solo, crm, form, fundador_tecnico:1, menciona_dor:1, \"fundador técnico solo, dor de qualificação\"}\n   - Signal: Justificativa subjetiva + contradicts lead (fundador_tecnico=1, menciona_dor=1, contexto mentions \"dor de qualificação\" which aligns with H-NV1). This is STRONG - H1 and H2 likely apply.\n   - SaaS B2B, but still within faturamento band.\n\n3. `d-1778627436063-5`: reasoned \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", lead={SaaS B2B, 50k-500k, dedicado, crm, form, fundador_tecnico:0, menciona_dor:0, \"CTO mencionou interesse em explicabilidade\"}\n   - Signal: Justificativa subjetiva. Also \"CTO mencionou interesse em explicabilidade\" aligns with H-NV2 (decisores técnicos pagariam premium por explicabilidade). Since CTO mentioned explicabilidade, H2 might apply. But lead.fundador_tecnico=0 (CTO is not necessarily founder). Let's think: \"interesse em explicabilidade\" could trigger H2 (dor específica em hipótese não validada). This is suspicious.\n\n4. `d-1778627436065-6`: reasoned \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", lead={agência, 50k-500k, dedicado, null, form, fundador_tecnico:0, menciona_dor:0, \"agência jovem crescendo rápido\"}\n   - Signal: Justificativa subjetiva. Less divergence signals from lead data.\n\n5. `d-1778627436069-9`: reasoned \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", lead={SaaS B2B, 50k-500k, solo, crm, form, fundador_tecnico:1, menciona_dor:1, \"fundador técnico solo, dor de qualificação\"}\n   - Signal: Justificativa subjetiva + same as d-2 (H1/H2 triggers). Almost identical lead to d-2.\n\nSo we have strong suspicion on d-2 (d-1778627436033-7) and d-5 (d-1778627436069-9) because they have fundador_tecnico=1 AND menciona_dor=1 AND context mentions \"dor de qualificação\" which triggers H1 and H2. These are DESCARTAR/A decisions with clear triggers for PRIORIZAR.\n\nd-3 (d-1778627436063-5) is also suspicious because \"CTO mencionou interesse em explicabilidade\" triggers H2 (H-NV2).\n\nd-1 and d-4 are less suspicious from the lead data alone (no obvious heuristic triggers).\n\nSince all 5 have the same subjective reasoning, but d-2, d-3, d-5 have the strongest signals. However d-2 and d-5 are almost identical leads. We should choose for diversity while keeping strong suspects.\n\nActually, per choose-representatives: since bucket is `descartar/A/0` (flip contra tier), these are priority candidates. We need to choose up to 3. We should prioritize:\n- d-1778627436033-7: strong signals (H1 + H2 violated), unique lead profile (SaaS B2B, solo, fundador técnico + dor)\n- d-1778627436063-5: strong signal (H2 potentially violated via explicabilidade), different lead profile (dedicado, CTO)\n- d-1778627436065-6 or d-1778627435993-7: for diversity. d-1 is infoprodutor (on-target ICP per contexto-momento!), actually that's extremely relevant since contexto-momento says foco is infoprodutores brasileiros faturando 50k-500k. Descartar an infoprodutor in tier A is suspicious because it's the core ICP. Let's check: d-1 is infoprodutor, 50k-500k, demo, time_vendas:dedicado. This aligns with ICP! Descartar is suspicious. But there's no clear heuristic besides H6. Wait, H6 says default tier A → priorizar. So any descartar/A is H6 violation.\n\nActually all 5 are descartar/A so all violate H6 potentially. But d-2 and d-5 also violate H1 and H2. d-1 is an infoprodutor in the exact target market but with no fundador_tecnico or menciona_dor - still H6 applies. d-3 has \"CTO mencionou interesse em explicabilidade\" which relates to H-NV2.\n\nFor maximum diversity and signal:\n1. d-1778627435993-7 (infoprodutor, different segment)\n2. d-1778627436033-7 (SaaS B2B, fundador técnico + dor)\n3. d-1778627436063-5 (SaaS B2B, CTO + explicabilidade)\n\nWait, but d-2 and d-5 are almost identical. I should choose one of them plus d-1 and d-3 for diversity. Actually the instruction says \"prioriza divergência aparente do gabarito > diversidade de lead > random\". So if d-2 and d-5 have highest divergence, I should pick one of them, and then the next most divergent.\n\nBut all 5 have identical reasoning text. The divergence comes from the lead data. The leads where H1/H2 clearly apply (fundador_tecnico=1 + menciona_dor=1) are most divergent. That's d-2 and d-5. Between d-2 and d-5 they're almost identical. Since they have the same lead profile, maybe pick just one and use the remaining slots for diversity to see if the subjective reasoning is applied uniformly across different leads.\n\nGiven that all 5 have the exact same reasoning, the question is: does the agent consistently ignore heuristics, or only in certain cases? To detect a pattern, I should sample:\n- d-1778627435993-7 (infoprodutor, fundador_tecnico=0, menciona_dor=0) - pure H6 default\n- d-1778627436033-7 (SaaS, fundador_tecnico=1, menciona_dor=1) - H1+H2+H6\n- d-1778627436063-5 (SaaS, CTO+explicabilidade) - potential H2+H6\n\nThis gives good diversity. Alternatively I could swap d-3 for d-4 (agência) but d-3 has the explicabilidad signal which is stronger.\n\nWait, the instruction says: \"Se bucket tem ≤K decisões, audite todas e pule a escolha.\" But bucket has 5 > K=3. So we choose 3.\n\nLet me think again: \"Flip contra tier: bucket é descartar/A/* ou priorizar/C/*. Esses são por definição candidatos prioritários — o agent contrariou o score objetivo. Geralmente vale auditar todos nesses buckets, mesmo que > K (mas o tool vai cortar em K — escolha os K mais suspeitos).\"\n\nSo we need the K=3 most suspeitos.\n- d-2: suspeita FORTE (H1, H2 violated)\n- d-5: suspeita FORTE (same as d-2)\n- d-3: suspeita FORTE-MEDIA (H2 potentially violated via explicabilidade, though fundador_tecnico=0)\n- d-1: suspeita MEDIA (infoprodutor on ICP, but no specific heuristic besides H6; bucket itself is suspicious)\n- d-4: suspeita MEDIA (descartar/A but no obvious triggers)\n\nBetween d-2 and d-5, they're identical. For the purpose of detecting divergence, auditing both is redundant unless we want to check consistency. But we only have 3 slots. Since d-2 and d-5 are identical, choosing one is enough. But actually the tool detects divergences in a single decision. If both are identical, the divergence found in one will apply to the other. But the instruction says deduplicate by (heuristic_ignored, bucket_key), so if the same heuristic is ignored in multiple decisions, it's still one divergence entry per decision? Wait no: \"Deduplique por (heuristic_ignored, bucket_key) — uma divergência por par.\" This suggests that if we detect the same heuristic ignored across multiple decisions in the same bucket, we deduplicate to one. But there's also a note: \"Aplique apenas dentro do mesmo (decision_id, bucket_key). Se o mesmo heurístico aparece ignorado em decisões diferentes, são divergências distintas (sinal de padrão, não dedup).\" Wait that's contradictory. Let me re-read.\n\nLooking back at system prompt:\n\"Junte todas as divergências retornadas. Deduplique por `(heuristic_ignored, bucket_key)` — uma divergência por par.\"\n\nBut then in Stage 3 notes:\n\"Aplique apenas dentro do mesmo `(decision_id, bucket_key)`. Se o mesmo heurístico aparece ignorado em decisões diferentes, são divergências distintas (sinal de padrão, não dedup).\"\n\nThis is contradictory. I'll follow the Stage 3 specific instruction as it seems more detailed: dedup only within same decision_id+bucket_key (compound divergences), but keep separate across different decision_ids. However, the output schema asks for divergences array and the summary. I think the instruction in the body \"Deduplique por (heuristic_ignored, bucket_key)\" might be outdated or wrong given the detailed note. The detailed note explicitly says \"Se o mesmo heurístico aparece ignorado em decisões diferentes, são divergências distintas (sinal de padrão, não dedup).\" I'll follow the detailed note.\n\nBut wait, \"Deduplique por `(heuristic_ignored, bucket_key)` — uma divergência por par.\" This seems to be from the general instruction. However the role-specific instruction says: \"Aplique **apenas dentro do mesmo `(decision_id, bucket_key)`**. Se o mesmo heurístico aparece ignorado em decisões diferentes, são divergências distintas (sinal de padrão, não dedup).\" So I will keep separate divergences for different decision_ids.\n\nActually, looking at the output schema, it asks for `divergences` with decision_id, bucket_key, etc. If we have the same heuristic in 2 different decisions, we emit 2 entries. But then when summarizing, we note it's a pattern.\n\nHowever, the initial instruction in the body says \"Deduplique por (heuristic_ignored, bucket_key)\". Maybe they mean for classify_origin and suggest_adjustment? No, those take decision_id. Hmm. I'll follow the role's specific instruction which overrides: dedup only within same decision_id (compound divergences).\n\nGiven that, since d-2 and d-5 are identical leads with identical reasoning, detecting divergence in both is redundant for
