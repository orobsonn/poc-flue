A is always H6 violation.\n\nFor d-3, \"CTO mencionou interesse em explicabilidade\" is interesting because H2 says \"dor específica em hipótese não validada\". H-NV2 is \"decisores técnicos pagariam premium por explicabilidade\". The lead says CTO (decisor técnico) mentioned interest in explicabilidade. This seems like a direct match for H2. So descartar this is suspicious.\n\nAlright, let's run detect_divergences on these 3. Since they're all in the same bucket, we need to call sequentially (the tool rejects > 3 per bucket, but we can call up to 3). Let me start with them.\n\nWait, the instruction says \"Pode paralelizar entre buckets distintos.\" Since we only have one bucket, we call sequentially or still in parallel? It might work in parallel since it's the same bucket but the limit is on reject >3, not on parallel. But to be safe, I'll call them sequentially or just fire them together since it's within the 3 limit.\n\nActually, let me just call all 3 at once since they're within the cap.", "input_preview": "{ \"decision_id\": \"d-1778627436033-7\" }", "input_full": "{\n  \"decision_id\": \"d-1778627436033-7\"\n}", "result_preview": "{\"decision_id\":\"d-1778627436033-7\",\"bucket_key\":\"descartar/A/0\",\"divergences\":[{\"heuristic_ignored\":\"H1 — Fundador técnico em fase de produto\",\"evidence\":\"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\"severity\":\"high\"}]}", "result_full": "{\"decision_id\":\"d-1778627436033-7\",\"bucket_key\":\"descartar/A/0\",\"divergences\":[{\"heuristic_ignored\":\"H1 — Fundador técnico em fase de produto\",\"evidence\":\"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\"severity\":\"high\"}]}", "elapsed_ms": 0, "children": [], "sub_kind": "detect"}, {"tool": "detect_divergences", "thinking": null, "input_preview": "{ \"decision_id\": \"d-1778627436063-5\" }", "input_full": "{\n  \"decision_id\": \"d-1778627436063-5\"\n}", "result_preview": "{\"decision_id\":\"d-1778627436063-5\",\"bucket_key\":\"descartar/A/0\",\"divergences\":[{\"heuristic_ignored\":\"H6 — Default por tier A\",\"evidence\":\"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\"severity\":\"high\"}]}", "result_full": "{\"decision_id\":\"d-1778627436063-5\",\"bucket_key\":\"descartar/A/0\",\"divergences\":[{\"heuristic_ignored\":\"H6 — Default por tier A\",\"evidence\":\"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\"severity\":\"high\"}]}", "elapsed_ms": 0, "children": [], "sub_kind": "detect"}, {"tool": "detect_divergences", "thinking": null, "input_preview": "{ \"decision_id\": \"d-1778627435993-7\" }", "input_full": "{\n  \"decision_id\": \"d-1778627435993-7\"\n}", "result_preview": "{\"decision_id\":\"d-1778627435993-7\",\"bucket_key\":\"descartar/A/0\",\"divergences\":[{\"heuristic_ignored\":\"H6 — Default por tier A\",\"evidence\":\"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\"severity\":\"high\"}]}", "result_full": "{\"decision_id\":\"d-1778627435993-7\",\"bucket_key\":\"descartar/A/0\",\"divergences\":[{\"heuristic_ignored\":\"H6 — Default por tier A\",\"evidence\":\"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\"severity\":\"high\"}]}", "elapsed_ms": 0, "children": [], "sub_kind": "detect"}, {"tool": "classify_origin", "thinking": "Great. Divergences detected:\n\n1. d-1778627436033-7: H1 ignored (high)\n2. d-1778627436063-5: H6 ignored (high)\n3. d-1778627435993-7: H6 ignored (high)\n\nNote: For d-1778627436033-7, detect_divergences only flagged H1, but we also expected H2 and H6. However, per the dedup rule within same decision_id, if multiple heuristics are ignored in the same decision, we emit only one entry with the most salient heuristic. Here H1 is probably more specific than H6. But the instruction says \"Aplique apenas dentro do mesmo (decision_id, bucket_key).\" Since d-1778627436033-7 had H1 flagged and H6 could also be flagged, but detect_divergences only returned H1, I should use what the tool returned. The tool is the one that decides which heuristics are violated. It returned only H1 for that decision.\n\nWait, but looking at d-1778627436033-7, the tool said H1 ignored. It didn't mention H2 or H6. But H6 default also applies. Should I manually add H6? No, I should trust the tool output. But the instructions say \"SEMPRE inspecione o mecanismo do raciocínio mesmo se o did parecer alinhado com o tier — a tese do auditor é detectar agente que toma decisão certa por motivo errado, ou decisão errada inventando justificativa.\" The detect_divergences tool is what does this inspection. It returned only H1.\n\nHowever, looking at the other two decisions, H6 was returned. So for d-1778627436033-7, the most salient is H1. For d-1778627436063-5 and d-1778627435993-7, it's H6.\n\nNow I need to classify origins for each divergence. Since these are all in the same bucket but different decision_ids and different heuristics (H1 vs H6), they are separate divergences per the dedup rule.\n\nLet me call classify_origin for all three. These can be independent, so I'll call them in parallel.", "input_preview": "{ \"decision_id\": \"d-1778627436033-7\", \"bucket_key\": \"descartar/A/0\", \"heuristic_ignored\": \"H1 — Fundador técnico em fase de produto\", \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", \"severity\": \"hig…", "input_full": "{\n  \"decision_id\": \"d-1778627436033-7\",\n  \"bucket_key\": \"descartar/A/0\",\n  \"heuristic_ignored\": \"H1 — Fundador técnico em fase de produto\",\n  \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\n  \"severity\": \"high\"\n}", "result_preview": "{\"target\":\"prompt-issue\",\"rationale\":\"H1 está literalmente no gabarito e a condição aplica (contexto-momento indica fase de produto), mas o reasoned descarta o lead por critério qualitativo inventado ('descomprometimento na call') sem invocar H1 — falha no prompt do qualificar-lead, que não força citar o heurístico qua…", "result_full": "{\"target\":\"prompt-issue\",\"rationale\":\"H1 está literalmente no gabarito e a condição aplica (contexto-momento indica fase de produto), mas o reasoned descarta o lead por critério qualitativo inventado ('descomprometimento na call') sem invocar H1 — falha no prompt do qualificar-lead, que não força citar o heurístico quando a condição dispara.\"}", "elapsed_ms": 0, "children": [{"tool": "read", "thinking": "We need to classify origin of divergence. The divergence:\n- decision_id: d-1778627436033-7\n- heuristic_ignored: H1 — Fundador técnico em fase de produto\n- evidence: \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\"\n- severity: high\n- bucket_key: descartar/A/0\n\nSo the agent descartou (discarded) a tier A lead, ignoring H1 (fundador técnico em fase de produto). The evidence says they discarded even though tier A because the contact signaled lack of commitment on the call.\n\nWe need to decide among:\n1. prompt-issue\n2. gabarito-stale\n3. criterio-faltando\n4. contexto-mudou\n5. inconclusive\n\nWe have gabarito and contexto_momento provided. We should read the references if needed. But maybe we can decide directly.\n\nLet's reason: The heuristic H1 says: if lead has technical founder/CTO AND context indicates product phase, prioritize even if medium objective score. The contexto_momento says phase is product validation. So H1 is currently relevant. The gabarito is clear.\n\nThe agent discarded a tier A lead with a technical founder? The evidence: \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\". So the agent's reasoned is that the contact showed lack of commitment. But H6 says default for tier A is prioritize unless H3 (enterprise without capacity). H1 also says prioritize if technical founder in product phase. So ignoring H1 and H6 to discard based on \"descomprometimento\" is not supported by the heuristic. Is there a criterion missing? Maybe the rubrica doesn't have a criterion for \"descomprometimento\". But the question is origin of divergence: why did the agent ignore H1? It could be that the prompt didn't instruct to apply H1, or the agent made a mistake. That would be prompt-issue.\n\nLet's check references to be sure. We should read .agents/skills/classify-origin/references/prompt-issue.md and maybe gabarito-stale.md to see definitions.\n\nLet's read prompt-issue.md.", "input_preview": "{ \"path\": \"/workspace/.agents/skills/classify-origin/references/prompt-issue.md\" }", "input_full": "{\n  \"path\": \"/workspace/.agents/skills/classify-origin/references/prompt-issue.md\"\n}", "result_preview": "# Target: prompt-issue ## Definição precisa `prompt-issue` = **o heurístico existe no gabarito, a condição se aplica ao lead, mas o agente não o invoca**. A falha está no prompt do `qualificar-lead`, que não força citar o heurístico quando deveria. > Default quando o `heuristic_ignored` aparece literal no gabarito. Só …", "result_full": "# Target: prompt-issue\n\n## Definição precisa\n\n`prompt-issue` = **o heurístico existe no gabarito, a condição se aplica ao lead, mas o agente não o invoca**. A falha está no prompt do `qualificar-lead`, que não força citar o heurístico quando deveria.\n\n> Default quando o `heuristic_ignored` aparece literal no gabarito. Só procure outro target se houver evidência clara contra `prompt-issue`.\n\n## Quando aplicar\n\nA condição literal de um heurístico do gabarito se aplica ao lead (verificável nos campos estruturados ou no contexto-livre), mas o `reasoned` do agente não cita o Hx correspondente e justifica a decisão por outro caminho. O gabarito em si está correto e atual — o que falha é a tradução pro prompt do `qualificar-lead`, que não força citar o heurístico quando a condição aplica. Tem que ser sistemático em buckets similares, não caso isolado.\n\n## Sinais positivos\n- O `heuristic_ignored` aparece **literal** no markdown do gabarito (procurar pela sigla Hx ou pela primeira linha da seção)\n- Gabarito está claro e a condição do Hx é objetivamente verificável no input do lead\n- Múltiplos representantes do mesmo bucket (ou buckets adjacentes) ignoram o mesmo Hx\n- O `reasoned` justifica a decisão por tier objetivo ou outro Hx, sem mencionar o ignorado\n- O `contexto_momento` confirma que a fase/capacidade descrita no Hx ainda vale (excluindo `gabarito-stale`)\n\n## Sinais que NÃO indicam prompt-issue (anti-patterns)\n- Heurístico aparece ignorado em 1 caso isolado → `inconclusive` (provável ruído)\n- O `reasoned` articula uma versão mais nuançada que o gabarito → `gabarito-stale`\n- A condição do Hx depende de contexto-momento defasado (ex: gabarito assume fase X mas `contexto_momento` mostra fase Y) → `contexto-mudou`\n- O fator que aparece no `reasoned` **não tem Hx correspondente no gabarito** → `criterio-faltando`\n\n## Fronteira com targets adjacentes\n| Pista | prompt-issue | Outro target |\n|---|---|---|\n| Hx existe no gabarito, condição aplica, agente não cita | **sim** | — |\n| Hx precisa refinar condição/mecanismo | não | gabarito-stale |\n| Heurístico do `heuristic_ignored` **não aparece** no markdown do gabarito | não | criterio-faltando |\n| Capacidade/fase do `contexto_momento` contradiz o reasoned | não | contexto-mudou |\n\n## Worked example 1 — H1 ignorado (caso clássico)\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H1 — Fundador técnico em fase de produto\",\n  \"evidence\": \"lead tem CTO citado no contexto-livre e contexto-momento indica fase de produto; reasoned justifica 'descartar porque tier objetivo C → custo de oportunidade supera valor' sem invocar H1\",\n  \"severity\": \"high\"\n}\n```\n\n**Verificação**:\n- \"H1 — Fundador técnico em fase de produto\" está no gabarito? Sim (procurar `## H1`).\n- Condição aplica? Sim — `lead.fundador_tecnico=1` AND `contexto_momento` em fase de produto.\n- `contexto_momento` ainda diz \"fase de produto\"? Sim — então não é `gabarito-stale` nem `contexto-mudou`.\n\n```json\n{\n  \"target\": \"prompt-issue\",\n  \"rationale\": \"H1 está no gabarito e a condição aplica (fundador técnico + fase de produto confirmada no contexto-momento), mas o reasoned justifica por tier puro sem invocar H1 — falha no prompt do qualificar-lead, que não força citar H1 quando a condição dispara.\"\n}\n```\n\n## Worked example 2 — H6 ignorado (caso do trace pré-refino que estava sendo classificado errado)\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H6 — Default por tier A\",\n  \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\n  \"severity\": \"high\"\n}\n```\n\n**Verificação**:\n- \"H6 — Default por tier A\" está no gabarito? **Sim** (seção `## H6 — Default por tier A` existe).\n- Condição aplica? Sim — tier objetivo é A e nenhum H1..H5 dispara em sentido contrário.\n- `contexto_momento` mudou? Não — H6 é regra de tier, independe de fase.\n\n```json\n{\n  \"target\": \"prompt-issue\",\n  \"rationale\": \"H6 está no gabarito (`## H6 — Default por tier A`) e a condição aplica (tier A sem heurístico contrário disparado). O reasoned inventa critério qualitativo ('descomprometimento na call') ausente do gabarito e contraria a recomendação de priorizar — falha está no prompt do qualificar-lead, que não força citar H6 quando tier=A e nenhum heurístico contrário aparece. Não é `criterio-faltando` porque H6 existe — o que falta é o prompt forçar o uso.\"\n}\n```\n\n**Erro comum a evitar**: classificar este caso como `criterio-faltando` (alvo: `criterios-icp.md`) porque o reasoned menciona \"descomprometimento\" — esse é o fator inventado pelo agente, não a regra do gabarito. O critério ignorado é H6, e H6 existe.\n\n## Limites de escopo\nNão estender pra \"talvez o gabarito também precise melhorar\" — se a divergência é dupla, separar em duas divergências. Aqui só classifica origem.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": "The reference prompt-issue.md includes a worked example 2 that is exactly our case: H6 ignored, evidence \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", and it says target is prompt-issue. Our divergence is slightly different: heuristic_ignored is H1, not H6. But the evidence is the same string. Let's read the other references maybe to see if gabarito-stale or contexto-mudou apply.\n\nThe gabarito says H1 is about technical founder in product phase. The contexto_momento says product validation phase. So H1 is current.\n\nThe agent discarded tier A because of \"descomprometimento na call\". This is an invented criterion. But the heuristic ignored is H1. Does H1 apply? The lead would need to have a technical founder/CTO. We don't have the lead fields, but the divergence states heuristic_ignored is H1 — implying the condition applied (technical founder + product phase). So we treat it as applicable.\n\nNow, is it prompt-issue? According to the reference, when the heuristic exists in the gabarito, condition applies, and agent doesn't cite it, default is prompt-issue unless evidence against.\n\nBut there's also H6 which is the default for tier A. The evidence is the same as worked example 2. In that example, they said prompt-issue because H6 exists and the prompt didn't force citing H6.\n\nHere, the heuristic ignored is H1, not H6. But the evidence is the same: \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\". This means the agent ignored both H1 and H6? Or maybe the divergence detection flagged H1 as the most salient. The instruction says: when a single decision violates multiple heuristics, emit one entry with the most salient. So likely this decision ignored H1 (fundador técnico) and H6 (default tier A) but the most salient is H1. In that case, the origin is still prompt-issue because the prompt didn't force the agent to apply H1 and H6.\n\nBut let's also read the other references to be thorough.", "input_preview": "{ \"path\": \"/workspace/.agents/skills/classify-origin/references/gabarito-stale.md\" }", "input_full": "{\n  \"path\": \"/workspace/.agents/skills/classify-origin/references/gabarito-stale.md\"\n}", "result_preview": "# Target: gabarito-stale ## Quando aplicar O heurístico do gabarito (`expected-reasoning/qualificador/fit-estrategico.md`) está fraco: a condição é específica demais (não captura caso recorrente que deveria), genérica demais (dispara sem precisão), ou o mecanismo causal já não bate com a realidade do produto/mercado. O…", "result_full": "# Target: gabarito-stale\n\n## Quando aplicar\nO heurístico do gabarito (`expected-reasoning/qualificador/fit-estrategico.md`) está fraco: a condição é específica demais (não captura caso recorrente que deveria), genérica demais (dispara sem precisão), ou o mecanismo causal já não bate com a realidade do produto/mercado. O `reasoned` do agente revela um raciocínio mais maduro que o próprio gabarito — e isso aparece em múltiplos casos. O contexto-momento em si está OK; quem precisa refinar é o Hx.\n\n## Sinais positivos\n- `reasoned` articula uma versão mais nuançada/precisa que o texto do Hx\n- A condição do Hx é binária mas a realidade é gradiente (ex: \"fundador técnico\" vs \"qualquer perfil técnico no time\")\n- Hx não cobre um caso comum que claramente devia entrar nele\n- Padrão se repete em buckets distintos com o mesmo Hx\n\n## Sinais que NÃO indicam gabarito-stale (anti-patterns)\n- Agente ignorou um Hx claro cujo texto está bom → `prompt-issue`\n- Capacidade/fase do contexto-momento mudou e Hx ainda referencia o antigo → `contexto-mudou`\n- Fator usado no `reasoned` deveria estar na rubrica objetiva → `criterio-faltando`\n- Caso único sem recorrência → `inconclusive`\n\n## Fronteira com targets adjacentes\n| Pista | gabarito-stale | Outro target |\n|---|---|---|\n| Texto do Hx precisa refinar condição/mecanismo | sim | — |\n| Hx OK mas prompt não invoca | não | prompt-issue |\n| Hx OK mas contexto-momento antigo | não | contexto-mudou |\n| Dimensão nova que merece Hx ou critério próprio | não | criterio-faltando |\n\n## Exemplo worked\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H2 — Dor específica em hipótese não validada\",\n  \"evidence\": \"lead menciona 'desafio operacional na qualificação manual' sem ser exatamente as hipóteses H-NV1/H-NV2; reasoned diz 'priorizar porque interlocutor menciona desafio operacional → aprendizado supera custo'\",\n  \"severity\": \"med\"\n}\n```\n\n**Output esperado:**\n```json\n{\n  \"target\": \"gabarito-stale\",\n  \"rationale\": \"reasoned articula H2 de forma mais nuançada que o gabarito — o texto atual exige coincidência literal com hipótese não validada, mas a evidência mostra que qualquer desafio operacional adjacente já é aprendizado relevante. O Hx precisa refinar a condição de 'dor coincidente com hipótese' pra abrir pra adjacências\"\n}\n```\n\n## Limites de escopo\nNão propor o texto novo do Hx aqui — isso é trabalho do `suggest-adjustment`. Aqui só classifica.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": "Let's also read contexto-mudou.md and criterio-faltando.md to be thorough.", "input_preview": "{ \"path\": \"/workspace/.agents/skills/classify-origin/references/contexto-mudou.md\" }", "input_full": "{\n  \"path\": \"/workspace/.agents/skills/classify-origin/references/contexto-mudou.md\"\n}", "result_preview": "# Target: contexto-mudou ## Quando aplicar O `reasoned` do agente referencia capacidade, fase, foco ou hipóteses diferentes do que está declarado no `agents-config/qualificador/contexto-momento.md`. O gabarito até pode estar OK em si, mas opera sobre um contexto-momento defasado — quem precisa atualizar é o snapshot de…", "result_full": "# Target: contexto-mudou\n\n## Quando aplicar\nO `reasoned` do agente referencia capacidade, fase, foco ou hipóteses diferentes do que está declarado no `agents-config/qualificador/contexto-momento.md`. O gabarito até pode estar OK em si, mas opera sobre um contexto-momento defasado — quem precisa atualizar é o snapshot de \"onde a empresa está agora\", não o Hx. Hipóteses não validadas que o mercado já validou (ou refutou) também caem aqui.\n\n## Sinais positivos\n- `reasoned` afirma \"agora suportamos enterprise\" mas contexto-momento diz \"enterprise inviável\"\n- Decisões sistemáticas contradizem o que o contexto-momento declara (capacidade, foco, fase)\n- Hipóteses não validadas (H-NV1, H-NV2) já têm sinal claro de validação/refutação que não foi incorporado\n- A defasagem aparece em buckets distintos, sempre puxando da mesma seção do contexto\n\n## Sinais que NÃO indicam contexto-mudou (anti-patterns)\n- Divergência é sobre o texto de um Hx específico → `gabarito-stale`\n- Hx aplicável foi ignorado mas contexto está OK → `prompt-issue`\n- Fator novo do `reasoned` é dimensão objetiva ausente da rubrica → `criterio-faltando`\n- Decisão isolada citando capacidade futura sem padrão → `inconclusive`\n\n## Fronteira com targets adjacentes\n| Pista | contexto-mudou | Outro target |\n|---|---|---|\n| Capacidade/fase/foco/hipóteses contradiz o reasoned | sim | — |\n| Texto do Hx precisa refinar | não | gabarito-stale |\n| Rubrica objetiva sem dimensão nova | não | criterio-faltando |\n| Hx claro ignorado | não | prompt-issue |\n\n## Exemplo worked\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H3 — Enterprise sem capacidade\",\n  \"evidence\": \"3 leads enterprise (>R$ 5M/mês) priorizados em vez de mantidos; reasoned recorrente: 'priorizar porque time atual já comporta enterprise — capacidade dobrou nas últimas semanas'\",\n  \"severity\": \"high\"\n}\n```\n\n**Output esperado:**\n```json\n{\n  \"target\": \"contexto-mudou\",\n  \"rationale\": \"reasoned afirma capacidade dobrada mas contexto-momento (2026-05) declara time de 3 pessoas, ~20 clientes ativos e enterprise inviável. O Hx H3 ainda está correto na lógica — quem precisa atualizar é a seção 'Capacidade' do contexto-momento pra refletir o novo tamanho do time\"\n}\n```\n\n## Limites de escopo\nNão inventar o novo texto da seção aqui — isso é trabalho do `suggest-adjustment` com `ajuste-contexto.md`. Aqui só sinaliza qual seção do contexto-momento parece defasada.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \"/workspace/.agents/skills/classify-origin/references/criterio-faltando.md\" }", "input_full": "{\n  \"path\": \"/workspace/.agents/skills/classify-origin/references/criterio-faltando.md\"\n}", "result_preview": "# Target: criterio-faltando ## Definição precisa `criterio-faltando` = **o heurístico necessário não existe no gabarito**. A rubrica está incompleta — falta dimensão objetiva que deveria fazer parte da regra. > Se o heurístico **existe no gabarito** (qualquer H1..Hn está listado lá) mas o agente não o invoca, NÃO é `cr…", "result_full": "# Target: criterio-faltando\n\n## Definição precisa\n\n`criterio-faltando` = **o heurístico necessário não existe no gabarito**. A rubrica está incompleta — falta dimensão objetiva que deveria fazer parte da regra.\n\n> Se o heurístico **existe no gabarito** (qualquer H1..Hn está listado lá) mas o agente não o invoca, NÃO é `criterio-faltando`. É `prompt-issue`. Sempre verifique antes: o heurístico aparece literalmente no markdown do gabarito?\n\n## Quando aplicar\n\nA rubrica objetiva (`agents-config/qualificador/criterios-icp.md`) não pondera uma dimensão que o agente está sistematicamente usando pra justificar decisão. O `reasoned` puxa do contexto-livre um fator que parece objetivo (mensurável, recorrente), mas nenhum dos 5 critérios atuais (segmento, faturamento, time, ferramentas, sinal de intenção) cobre. **E nenhum heurístico Hx do gabarito cobriria essa dimensão** — não é refinamento de prompt, é lacuna real.\n\n## Pré-checagem obrigatória\n\nAntes de classificar como `criterio-faltando`, responda:\n\n1. ds SaaS B2B com >10k usuários ativos descartados como tier C (faturamento <50k) — reasoned cita 'base de usuários relevante mas rubrica não pondera' em 2 dos 3 casos\",\n  \"severity\": \"high\"\n}\n```\n\n**Pré-checagem**:\n1. \"Base de usuários ativos\" aparece como Hx do gabarito? Não.\n2. Algum Hx existente cobre isso? Não — H1..H7 olham fundador técnico, dor, enterprise, sinal demo, tier, defaults. Nenhum modela base de usuários.\n3. É sobre a empresa que vende? Não, é sobre o lead.\n\n→ Classifica como `criterio-faltando`.\n\n```json\n{\n  \"target\": \"criterio-faltando\",\n  \"rationale\": \"múltiplos leads SaaS B2B com >10k usuários ativos descartados porque rubrica só pondera faturamento mensal — base de usuários ativos é dimensão objetiva, recorrente em buckets distintos, e nenhum dos 5 critérios atuais nem dos heurísticos H1..H7 captura essa dimensão. Não é prompt-issue porque não há Hx existente sendo ignorado.\"\n}\n```\n\n## Worked example INCORRETO (não confundir com prompt-issue)\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H6 — Default por tier A\",\n  \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\n  \"severity\": \"high\"\n}\n```\n\n**Pré-checagem**:\n1. \"H6 — Default por tier A\" aparece no gabarito? **Sim** (é uma das seções `## H6 ...` do markdown do gabarito).\n\n→ **NÃO é `criterio-faltando`.** O heurístico existe. Classifica como `prompt-issue`.\n\nSe você marcar isso como `criterio-faltando`, o `suggest-adjustment` vai propor mudar `agents-config/qualificador/criterios-icp.md` (rubrica de pontuação), mas o problema real é que o prompt do `qualificar-lead` não força citar H6 quando tier=A. PR resultante muda arquivo errado.\n\n## Limites de escopo\nNão definir aqui o peso novo nem qual critério perde — isso é tarefa do `suggest-adjustment` com `ajuste-criterio.md`.\n", "elapsed_ms": 0, "children": []}], "sub_kind": "classify"}, {"tool": "classify_origin", "thinking": null,  cita 'base de usuários relevante mas rubrica não pondera' em 2 dos 3 casos\",\n  \"severity\": \"high\"\n}\n```\n\n**Pré-checagem**:\n1. \"Base de usuários ativos\" aparece como Hx do gabarito? Não.\n2. Algum Hx existente cobre isso? Não — H1..H7 olham fundador técnico, dor, enterprise, sinal demo, tier, defaults. Nenhum modela base de usuários.\n3. É sobre a empresa que vende? Não, é sobre o lead.\n\n→ Classifica como `criterio-faltando`.\n\n```json\n{\n  \"target\": \"criterio-faltando\",\n  \"rationale\": \"múltiplos leads SaaS B2B com >10k usuários ativos descartados porque rubrica só pondera faturamento mensal — base de usuários ativos é dimensão objetiva, recorrente em buckets distintos, e nenhum dos 5 critérios atuais nem dos heurísticos H1..H7 captura essa dimensão. Não é prompt-issue porque não há Hx existente sendo ignorado.\"\n}\n```\n\n## Worked example INCORRETO (não confundir com prompt-issue)\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H6 — Default por tier A\",\n  \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\n  \"severity\": \"high\"\n}\n```\n\n**Pré-checagem**:\n1. \"H6 — Default por tier A\" aparece no gabarito? **Sim** (é uma das seções `## H6 ...` do markdown do gabarito).\n\n→ **NÃO é `criterio-faltando`.** O heurístico existe. Classifica como `prompt-issue`.\n\nSe você marcar isso como `criterio-faltando`, o `suggest-adjustment` vai propor mudar `agents-config/qualificador/criterios-icp.md` (rubrica de pontuação), mas o problema real é que o prompt do `qualificar-lead` não força citar H6 quando tier=A. PR resultante muda arquivo errado.\n\n## Limites de escopo\nNão definir aqui o peso novo nem qual critério perde — isso é tarefa do `suggest-adjustment` com `ajuste-criterio.md`.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \"/workspace/.agents/skills/classify-origin/references/contexto-mudou.md\" }", "input_full": "{\n alente\nAND contexto-momento indica fase de produto:\n- INVOQUE H1 explicitamente no `reasoned`, mesmo se `objective_tier` for B ou C\n- Formato sugerido: \"priorizar porque fundador técnico em fase de produto → feedback acelera roadmap (H1)\"\n\nNão pular H1 só porque o tier objetivo é C — H1 sobrescreve tier quando a condição aplica.\n~~~\n\n## Exemplo worked\n\n**Input divergence (classificada como prompt-issue):**\n```json\n{\n  \"heuristic_ignored\": \"H1 — Fundador técnico em fase de produto\",\n  \"evidence\": \"lead com CTO citado descartado por tier C; reasoned não invoca H1\",\n  \"target\": \"prompt-issue\"\n}\n```\n\n**Output esperado:**\n```json\n{\n  \"target_file\": \".flue/skills/qualificador/qualificar-lead/SKILL.md\",\n  \"proposed_change\": \"<bloco do template acima, adaptado pro H1>\",\n  \"rationale\": \"adicionar sub-seção 'Quando aplicar H1' obriga o agente a citar H1 quando a condição literal aplica, mesmo que objective_tier seja C — resolve o caso de fundadores técnicos em tier baixo sendo descartados\"\n}\n```\n\n## Limites de escopo\n- 1 sub-seção por sugestão (1 Hx por vez)\n- Não reescrever o SKILL.md inteiro\n- Não tocar o frontmatter (`name`, `description`, `model`)\n- Não mudar formato do `reasoned` global — só adicionar regra de invocação\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \".agents/skills/suggest-adjustment/SKILL.md\" }", "input_full": "{\n  \"path\": \".agents/skills/suggest-adjustment/SKILL.md\"\n}", "result_preview": "--- name: suggest-adjustment description: Gera texto de mudança proposta para um arquivo target específico baseado em divergência classificada. Recebe agora `contexto_momento` como insumo extra para grounding da sugestão no estado atual de negócio (fase, capacidade, foco). Use sempre que receber uma divergência com ori…", "result_full": "---\nname: suggest-adjustment\ndescription: Gera texto de mudança proposta para um arquivo target específico baseado em divergência classificada. Recebe agora `contexto_momento` como insumo extra para grounding da sugestão no estado atual de negócio (fase, capacidade, foco). Use sempre que receber uma divergência com origem já classificada — o output é texto livre da sugestão, NÃO diff (humano edita no PR). Skip se o target for unknown ou inconclusive.\nmodel: main\n---\n\n# Suggest Adjustment\n\nVocê gera texto de sugestão pra um arquivo específico.\n\n## Input\n- `divergencia`: { heuristic_ignored, evidence, target }\n- `current_content`: conteúdo atual do arquivo target\n- `contexto_momento`: markdown do contexto-momento.md (use como referência de fase, capacidade, foco atual ao formular a sugestão)\n\n## Operação\nConforme `target`, carregue a reference específica em `.agents/skills/suggest-adjustment/references/ajuste-<target>.md` (path absoluto no sandbox, leia com a tool `read`) e siga o template. Use `contexto_momento` para garantir que a sugestão reflete a fase/capacidade/foco atuais — especialmente em targets `gabarito-stale` e `contexto-mudou`.\n\n## Output\n```json\n{\n  \"target_file\": \"<caminho relativo ao repo>\",\n  \"proposed_change\": \"<texto livre da mudança proposta>\",\n  \"rationale\": \"<por que essa mudança resolve a divergência>\"\n}\n```\n\n## REGRAS DURAS DE FORMATO (não-negociáveis — o parser do framework lê o conteúdo cru entre `---RESULT_START---` e `---RESULT_END---`)\n\n- **NUNCA inclua cerca markdown** (```` ``` ````, ```` ```json ````) dentro do bloco entre os marcadores. O parser não remove cerca; um único ` ``` ` quebra o JSON inteiro. Coloque o objeto JSON direto, sem nenhum prefixo/sufixo.\n- **Aspas e quebras de linha dentro das strings**: use `\\n` literal para newline e `\\\"` para aspa interna. Não use crases nem aspas tipográficas (`\"` e `\"`).\n- **Sem texto fora do objeto**: nada antes do `{` nem depois do `}` dentro do bloco. Sem `Note:`, sem comentários, sem `// ...`.\n- **`proposed_change` é uma única string JSON**: se a sugestão tem múltiplos parágrafos ou pontos numerados, junte tudo numa única string usando `\\n` (ex: `\"1. Item um.\\n\\n2. Item dois.\"`). NÃO quebre em array nem em objeto aninhado — o schema é `string`.\n- **Cap de tamanho de `proposed_change`**: ~1500 caracteres. Se a sugestão for maior, sintetize em pontos numerados e mantenha foco no que muda no arquivo target — não repita evidência ou rationale.\n\n## REGRAS DURAS DE CONTEÚDO\n- NÃO gere diff — humano edita no PR\n- NÃO modifique seções não-relacionadas à divergência\n- Mantenha tom e estrutura do arquivo original\n- Se a sugestão for grande, divida em pontos numerados (dentro da string única de `proposed_change`)\n\n## Exemplo de output bem formado (entre os marcadores do framework)\n\n```\n---RESULT_START---\n{\"target_file\":\".flue/skills/qualificador/qualificar-lead/SKILL.md\",\"proposed_change\":\"Adicionar subseção \\\"Quando aplicar H6\\\" no fluxo de decisão:\\n\\n1. Se tier objetivo for A AND nenhum H1..H5 disparar em sentido contrário, cite H6 explicitamente no reasoned.\\n2. Não invente critérios qualitativos (descomprometimento, intenção) para inverter H6 — só H3 (enterprise sem capacidade) pode contradizê-lo.\",\"rationale\":\"Trace mostra 3 leads tier A descartados com justificativa qualitativa não suportada por nenhum Hx. Forçar citação de H6 no prompt elimina a inversão sem precisar mudar o gabarito.\"}\n---RESULT_END---\n```\n\nNote: nenhuma cerca markdown entre os marcadores, JSON puro, `\\n` literal nas quebras de linha.\n", "elapsed_ms": 0, "children": []}], "sub_kind": "suggest"}, {"tool": "suggest_adjustment", "thinking": null, "input_preview": "{ \"decision_id\": \"d-1778627435993-7\", \"bucket_key\": \"descartar/A/0\", \"heuristic_ignored\": \"H6 — Default por tier A\", \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", \"severity\": \"high\", \"target\": \"pr…", "input_full": "{\n  \"decision_id\": \"d-1778627435993-7\",\n  \"bucket_key\": \"descartar/A/0\",\n  \"heuristic_ignored\": \"H6 — Default por tier A\",\n  \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\n  \"severity\": \"high\",\n  \"target\": \"prompt-issue\"\n}", "result_preview": "{\"error\":\"[flue] Session \\\"suggest-H6---Default-por-tier-A-descartar-A-0-2026-05-12-agentic-b61e842c\\\" is already running skill. Start another session for parallel conversation branches.\"}", "result_full": "{\"error\":\"[flue] Session \\\"suggest-H6---Default-por-tier-A-descartar-A-0-2026-05-12-agentic-b61e842c\\\" is already running skill. Start another session for parallel conversation branches.\"}", "elapsed_ms": 0, "children": []}, {"tool": "suggest_adjustment", "thinking": "The third suggest_adjustment failed because of a session conflict. I'll retry it now.", "input_preview": "{ \"decision_id\": \"d-1778627435993-7\", \"bucket_key\": \"descartar/A/0\", \"heuristic_ignored\": \"H6 — Default por tier A\", \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\", \"severity\": \"high\", \"target\": \"pr…", "input_full": "{\n  \"decision_id\": \"d-1778627435993-7\",\n  \"bucket_key\": \"descartar/A/0\",\n  \"heuristic_ignored\": \"H6 — Default por tier A\",\n  \"evidence\": \"descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\",\n  \"severity\": \"high\",\n  \"target\": \"prompt-issue\"\n}", "result_preview": "{\"target_file\":\".flue/skills/qualificador/qualificar-lead/SKILL.md\",\"proposed_change\":\"Adicionar subseção \\\"Quando aplicar H6 — Default por tier A\\\" no fluxo de decisão:\\n\\n1. Se objective_tier for A AND nenhum H1..H5 disparar em sentido contrário, cite H6 explicitamente no reasoned como justificativa para priorizar.\\n…", "result_full": "{\"target_file\":\".flue/skills/qualificador/qualificar-lead/SKILL.md\",\"proposed_change\":\"Adicionar subseção \\\"Quando aplicar H6 — Default por tier A\\\" no fluxo de decisão:\\n\\n1. Se objective_tier for A AND nenhum H1..H5 disparar em sentido contrário, cite H6 explicitamente no reasoned como justificativa para priorizar.\\n2. NÃO invente critérios qualitativos (descomprometimento, intenção, postura na call) para inverter H6 — apenas heurísticos objetivos do gabarito (H1..H5) podem contradizer o default de tier A.\",\"rationale\":\"O agente descartou lead tier A usando 'descomprometimento na call', critério qualitativo inexistente no gabarito. H6 é default de priorização para tier A e só pode ser sobreposto por H1..H5 explícitos. A subseção obriga o agente a citar H6 literalmente e proíbe overrides por intuição qualitativa, resolvendo a divergência sem alterar o gabarito.\"}", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": "Great. Now I have all three classifications and suggestions.\n\nBefore summarizing, I should consider running query_decision_log to check if this pattern is systemic. The instruction says: \"Antes do summarize_patterns, considere se vale rodar 1-3 queries via query_decision_log(sql, hipotese) pra confirmar tendência (regression, oos_growth, budget_blow) ou padrão sistêmico cross-bucket.\"\n\nWe have a clear pattern: descartar/A decisions with subjective \"descomprometimento\" reasoning. Let me read the investigate-data skill to see what's recommended.", "input_preview": "{ \"path\": \".agents/skills/investigate-data/SKILL.md\" }", "input_full": "{\n  \"path\": \".agents/skills/investigate-data/SKILL.md\"\n}", "result_preview": "--- name: investigate-data description: Como investigar tendências e padrões cross-janela no D1 do qualificador usando a tool `query_decision_log(sql)`. Útil pra detectar regressão, growth de out_of_scope, blow-out de custo, ou validar se um padrão observado no run atual aparece em janelas anteriores. NÃO é um tool — é…", "result_full": "---\nname: investigate-data\ndescription: Como investigar tendências e padrões cross-janela no D1 do qualificador usando a tool `query_decision_log(sql)`. Útil pra detectar regressão, growth de out_of_scope, blow-out de custo, ou validar se um padrão observado no run atual aparece em janelas anteriores. NÃO é um tool — é conhecimento ambiente. A tool tem cap (10 queries/run, max 100 rows, só SELECT em decision_log/lead). Use antes de finalizar o summarize quando quiser confirmar se um padrão é sistêmico ou pontual. Consulte `.agents/skills/investigate-data/references/` pra queries prontas (tendência) e padrões de exploração ad-hoc.\nmodel: main\n---\n\n# Investigate Data\n\nVocê tem acesso direto ao D1 do agente qualificador via tool `query_decision_log(sql)`. Use pra responder perguntas que os dados de candidatos no prompt não respondem por si só.\n\n## Quando vale fazer query\n\n- **Antes de finalizar**: verificar se o padrão detectado no run atual é tendência (`regression`, `out_of_scope_growth`) ou ruído pontual. Sem isso, severity fica calibrada só com 1 janela.\n- **Validação cross-bucket**: se 2 buckets diferentes mostram o mesmo heurístico ignorado, vale ver se outras decisões fora dos buckets ativos também ignoram o mesmo heurístico.\n- **Investigação de outlier**: se 1 decisão tem reasoning bizarro, vale ver se aquele lead (`lead_id`) aparece em outras decisões do agente — pode revelar problema sistêmico com aquele perfil.\n- **Custo anômalo**: se uma decisão tem `cost_usd` ou `duration_ms` atípico, vale comparar com janela anterior.\n\n## Quando NÃO fazer query\n\n- Você já tem evidência suficiente do conjunto inline no prompt — não desperdice o cap.\n- Pra olhar **as decisões individuais que estão no prompt** — elas já estão lá. Query é pra dados que NÃO vieram inline.\n- Pra rodar consulta sem hipótese — \"vou ver o que tem aí\" é desperdício. Pergunte primeiro \"que sinal eu quero confirmar?\".\n\n## Schema do D1 disponível (read-only)\n\n```sql\n-- 1 linha por decisão tomada pelo qualificador\ndecision_log (\n  id TEXT PRIMARY KEY,\n  ts INTEGER NOT NULL,           -- epoch ms\n  agent_id TEXT NOT NULL,        -- pseudonimizado (HMAC)\n  thread_id TEXT NOT NULL,\n  domain TEXT NOT NULL,\n  phase TEXT,\n  did TEXT NOT NULL,             -- 'priorizar' | 'manter' | 'descartar' (texto do outcome)\n  reasoned TEXT NOT NULL,        -- raciocínio articulado X porque Y → Z\n  out_of_scope TEXT,             -- preenchido quando faltou dado pra aplicar heurístico\n  tools_called TEXT,             -- JSON array de tools invocadas (raramente útil)\n  duration_ms INTEGER,\n  cost_usd REAL,\n  model_main TEXT,\n  expected_reasoning_ref TEXT,\n  outcome TEXT,\n  outcome_source TEXT,\n  objective_tier TEXT NOT NULL,  -- 'A' | 'B' | 'C' (score objetivo da rubrica)\n  judgment_outcome TEXT NOT NULL,-- 'priorizar' | 'manter' | 'descartar' (canônico)\n  has_out_of_scope INTEGER NOT NULL DEFAULT 0,  -- 0 ou 1\n  lead_id TEXT\n);\n\n-- 1 linha por lead avaliado\nlead (\n  id TEXT PRIMARY KEY,\n  segmento TEXT,\n  faturamento_band TEXT,\n  time_vendas TEXT,\n  ferramentas TEXT,\n  sinal TEXT,\n  fundador_tecnico INTEGER,\n  menciona_dor INTEGER,\n  contexto_livre_sanitized TEXT\n);\n```\n\nÍndices úteis: `idx_decision_log_window(agent_id, ts)`, `idx_decision_log_bucket(judgment_outcome, objective_tier, has_out_of_scope)`, `idx_decision_log_lead(lead_id)`.\n\n## Restrições duras da tool\n\n- Só `SELECT` (DML/DDL rejeitados pelo parser).\n- Só `FROM decision_log` ou `FROM lead` (ou JOIN entre os dois). `audit_run` e `decision_log_rejected` são bloqueados — não interessam.\n- `LIMIT 100` é forçado (queries sem LIMIT recebem `LIMIT 100` adicionado).\n- Timeout 5s.\n- Cap de 10 queries por run — gaste com hipótese clara.\n\n## Exemplos rápidos\n\n### 1. Comparar % out_of_scope janela atual vs anterior\n\nUse quando quiser saber se OOS está crescendo.\n\n```sql\nSELECT\n  CASE WHEN ts > ? THEN 'atual' ELSE 'anterior' END AS janela,\n  COUNT(*) AS total,\n  SUM(has_out_of_scope) AS oos,\n  SUM(has_out_of_scope) * 100.0 / COUNT(*) AS oos_pct\nFROM decision_log\nWHERE agent_id = ? AND ts > ? AND ts <= ?\nGROUP BY 1;\n```\n\n(Parâmetros são strings — o agente substitui pelos timestamps reais lidos do prompt.)\n\n### 2. Heurístico ignorado em outros buckets\n\nSe você detectou H6 ignorado em `descartar/A/0`, vale ver se aparece em outras combinações.\n\n```sql\nSELECT judgment_outcome, objective_tier, has_out_of_scope, COUNT(*) AS n\nFROM decision_log\nWHERE agent_id = ? AND reasoned LIKE '%tier A%' AND reasoned LIKE '%descomprometimento%'\nGROUP BY 1,2,3;\n```\n\n### 3. Quantos leads únicos vs decisões repetidas\n\n```sql\nSELECT lead_id, COUNT(*) AS decisoes\nFROM decision_log\nWHERE agent_id = ? AND ts > ?\nGROUP BY lead_id\nHAVING COUNT(*) > 1\nORDER BY decisoes DESC\nLIMIT 20;\n```\n\n## Como pensar antes de cada query\n\n1. **Qual a hipótese?** Escreva (mesmo só pra você no thinking): \"Hipótese: o heurístico X foi violado em mais de N decisões fora desse bucket.\"\n2. **Que coluna distingue?** A query precisa de uma coluna binária ou agregad", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": "Let me also read the trend queries and exploration queries references to make informed queries.", "input_preview": "{ \"path\": \".agents/skills/investigate-data/references/queries-de-tendencia.md\" }", "input_full": "{\n  \"path\": \".agents/skills/investigate-data/references/queries-de-tendencia.md\"\n}", "result_preview": "# Queries de tendência cross-janela Os 3 sinais que o pipeline v0.2 pré-computava via `runSqlCriteria`. Quando relevantes pra severity do run, vale rodar uma dessas queries. ## 1. `regression` — taxa de contradição (descartar+A OU priorizar+C) **Hipótese**: o agente está flip-against-tier mais nessa janela que em janel…", "result_full": "# Queries de tendência cross-janela\n\nOs 3 sinais que o pipeline v0.2 pré-computava via `runSqlCriteria`. Quando relevantes pra severity do run, vale rodar uma dessas queries.\n\n## 1. `regression` — taxa de contradição (descartar+A OU priorizar+C)\n\n**Hipótese**: o agente está flip-against-tier mais nessa janela que em janelas anteriores.\n\n**Query** (substitua `<agent_id>`, `<from_ts>`, `<to_ts>`, `<size_ms>` pelos timestamps do prompt):\n\n```sql\nSELECT\n  CASE WHEN ts > <from_ts> THEN 'atual' ELSE 'anterior' END AS janela,\n  COUNT(*) AS total,\n  SUM(CASE WHEN (judgment_outcome = 'descartar' AND objective_tier = 'A')\n              OR (judgment_outcome = 'priorizar' AND objective_tier = 'C')\n           THEN 1 ELSE 0 END) AS contradicoes,\n  SUM(CASE WHEN (judgment_outcome = 'descartar' AND objective_tier = 'A')\n              OR (judgment_outcome = 'priorizar' AND objective_tier = 'C')\n           THEN 1 ELSE 0 END) * 100.0 / COUNT(*) AS contradicao_pct\nFROM decision_log\nWHERE agent_id = '<agent_id>'\n  AND ts > <from_ts - size_ms> AND ts <= <to_ts>\nGROUP BY 1\nORDER BY 1;\n```\n\n**Critério v0.2**: se `atual.contradicao_pct > anterior.contradicao_pct + 5pp`, marca `regression: triggered`. Use isso como benchmark mas confie no seu julgamento — diferença pequena com amostra pequena pode ser ruído.\n\n## 2. `out_of_scope_growth` — crescimento de OOS\n\n**Hipótese**: o agente está marcando `out_of_scope` em mais decisões — indica que critérios da rubrica estão ficando insuficientes pro material que chega.\n\n**Query**:\n\n```sql\nSELECT\n  CASE WHEN ts > <from_ts> THEN 'atual' ELSE 'anterior' END AS janela,\n  COUNT(*) AS total,\n  SUM(has_out_of_scope) AS oos,\n  SUM(has_out_of_scope) * 100.0 / COUNT(*) AS oos_pct\nFROM decision_log\nWHERE agent_id = '<agent_id>'\n  AND ts > <from_ts - size_ms> AND ts <= <to_ts>\nGROUP BY 1\nORDER BY 1;\n```\n\n**Critério v0.2**: se `atual.oos_pct > anterior.oos_pct + 5pp`, marca `out_of_scope_growth: triggered`.\n\n## 3. `budget_blow` — custo médio aumentou\n\n**Hipótese**: custo unitário por decisão subiu — geralmente indica que o agente está re-fazendo trabalho, fazendo retries, ou consumindo mais tokens em reasoning.\n\n**Query**:\n\n```sql\nSELECT\n  CASE WHEN ts > <from_ts> THEN 'atual' ELSE 'anterior' END AS janela,\n  COUNT(*) AS total,\n  AVG(cost_usd) AS cost_avg,\n  AVG(duration_ms) AS duration_avg\nFROM decision_log\nWHERE agent_id = '<agent_id>'\n  AND ts > <from_ts - size_ms> AND ts <= <to_ts>\nGROUP BY 1\nORDER BY 1;\n```\n\n**Critério v0.2**: se `atual.cost_avg > anterior.cost_avg * 1.30` (30% acima), marca `budget_blow: triggered`.\n\n## Como integrar no output\n\nSe uma query revela tendência, registre no campo `description` do pattern correspondente em `summarize_patterns`, OU mais forte: use no `cross_bucket_signal` se a tendência cruzar múltiplos buckets.\n\nExemplo:\n- Detectou H6 ignorado em `descartar/A/0` no run atual + query mostrou `contradicao_pct` saltou de 2% pra 18% vs janela anterior → cross_bucket_signal = \"Taxa de contradição contra tier subiu 16pp na janela atual; H6 e H5 ignorados em buckets distintos sugere problema sistêmico no prompt, não ruído pontual.\"\n\nEsse é o tipo de conclusão que justifica `severity: critical` mesmo sem promotion_recommendation explícito.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \".agents/skills/investigate-data/references/queries-de-exploracao.md\" }", "input_full": "{\n  \"path\": \".agents/skills/investigate-data/references/queries-de-exploracao.md\"\n}", "result_preview": "# Queries de exploração ad-hoc Queries pra responder perguntas específicas sobre dados que NÃO vieram no prompt. Use com hipótese clara — sem hipótese, gasta query do cap. ## 1. Esse heurístico aparece em outros buckets fora do que detectei? **Hipótese**: H6 ignorado em `descartar/A/0` — é só nesse bucket ou aparece em…", "result_full": "# Queries de exploração ad-hoc\n\nQueries pra responder perguntas específicas sobre dados que NÃO vieram no prompt. Use com hipótese clara — sem hipótese, gasta query do cap.\n\n## 1. Esse heurístico aparece em outros buckets fora do que detectei?\n\n**Hipótese**: H6 ignorado em `descartar/A/0` — é só nesse bucket ou aparece em outros?\n\n```sql\nSELECT judgment_outcome, objective_tier, has_out_of_scope, COUNT(*) AS n\nFROM decision_log\nWHERE agent_id = '<agent_id>'\n  AND ts > <from_ts> AND ts <= <to_ts>\n  AND reasoned LIKE '%descomprometimento%'\nGROUP BY 1, 2, 3\nORDER BY n DESC;\n```\n\nAdapte o `LIKE` pra padrão linguístico que você identificou na evidência.\n\n## 2. Esse lead específico aparece em outras decisões?\n\n**Hipótese**: a decisão `d-XYZ` parece bizarra — o lead apareceu antes?\n\n```sql\nSELECT dl.id, dl.ts, dl.judgment_outcome, dl.objective_tier, dl.reasoned\nFROM decision_log dl\nWHERE dl.lead_id = (SELECT lead_id FROM decision_log WHERE id = '<decision_id>')\n  AND dl.agent_id = '<agent_id>'\nORDER BY dl.ts DESC\nLIMIT 20;\n```\n\n## 3. Lead com decisões duplicadas/inconsistentes\n\n**Hipótese**: o mesmo lead foi avaliado múltiplas vezes com decisões diferentes — indica indecisão do qualificador.\n\n```sql\nSELECT lead_id,\n       COUNT(*) AS n,\n       COUNT(DISTINCT judgment_outcome) AS outcomes_distintos\nFROM decision_log\nWHERE agent_id = '<agent_id>'\n  AND ts > <from_ts> AND ts <= <to_ts>\n  AND lead_id IS NOT NULL\nGROUP BY lead_id\nHAVING n > 1 AND outcomes_distintos > 1\nORDER BY n DESC;\n```\n\n## 4. Distribuição de tiers nessa janela vs histórico\n\n**Hipótese**: a janela atual tem proporção atípica de tier C / tier A — pode explicar viés na decisão.\n\n```sql\nSELECT\n  CASE WHEN ts > <from_ts> THEN 'atual' ELSE 'historico' END AS janela,\n  objective_tier,\n  COUNT(*) AS n\nFROM decision_log\nWHERE agent_id = '<agent_id>'\n  AND ts > <from_ts - 7 * 24 * 3600 * 1000> AND ts <= <to_ts>\nGROUP BY 1, 2\nORDER BY 1, 2;\n```\n\n(7 dias de histórico contra a janela atual.)\n\n## 5. Decisões com reasoning vazio ou suspeito\n\n**Hipótese**: alguma fração das decisões tem reasoning < 40 caracteres (genérico/preguiçoso).\n\n```sql\nSELECT id, judgment_outcome, objective_tier, LENGTH(reasoned) AS rl, reasoned\nFROM decision_log\nWHERE agent_id = '<agent_id>'\n  AND ts > <from_ts> pts/qualificador.md\",\"proposed_change\":\"Inserir uma subseção obrigatória sob os critérios de descarte:\\n\\n1. **Heurístico H2 — Dor específica em hipótese não validada**: Antes de executar qualquer descarte, o agente deve verificar se o lead manifestou dor específica relacionada às hipóteses não validadas em vigor (atualmente H-NV1: automação de qualificação de leads; H-NV2: explicabilidade para decisores técnicos).\\n\\n2. **Regra de contenção**: O agente NÃO deve descartar um lead classificado como tier A exclusivamente por sinais comportamentais de descomprometimento (ex.: baixa participação em call, respostas curtas ou postergação de decisão) se houver qualquer evidência de que o lead enfrenta a dor captureada em H-NV1 ou H-NV2.\\n\\n3. **Ação alternativa**: Quando H2 for acionado em um lead que, de outra forma, seria descartado por desengajamento, o agente deve:\\n   - Interromper o fluxo de descarte;\\n   - Anotar o sinal como `out_of_scope=validacao_hipotese` no campo `reasoned`;\\n   - Preservar o lead para aprofundamento, dado que o produto está em fase de validação e cada sinal de dor real sobre hipóteses não validadas tem prioridade máxima sobre comportamento de interlocutores individuais.\",\"rationale\":\"A divergência detectada evidencia que o agente descartou um lead tier A fundamentado unicamente no descomprometimento do interlocutor durante a call, ignorando o heurístico H2. Em fase de validação de produto com time de 3 pessoas e foco em infoprodutores brasileiros (R$ 50k–500k/mês), a prioridade é validar se as dores de H-NV1 e H-NV2 são reais. Descartar leads que carregam esses sinais específicos por motivos comportamentais gera falsos negativos críticos e corrói a taxa de aprendizado. A mudança insere no prompt uma regra explícita de contenção que prioriza a coleta de evidência de dor alinhada às hipóteses não validadas acima de heurísticos genéricos de engajamento.\"}", "elapsed_ms": 0, "children": [], "sub_kind": "suggest"}, {"tool": "suggest_adjustment", "thinking": null, "input_preview": "{ \"bucket_key\": \"priorizar/A/1\", \"decision_id\": \"d-1778621596106-7\", \"evidence\": \"priorizar porque fundador técnico em fase de produto → feedback acelera roadmap (H1)\", \"heuristic_ignored\": \"H2 — Dor específica em hipótese não validada\", \"s…", "input_full": "{\n  \"bucket_key\": \"priorizar/A/1\",\n  \"decision_id\": \"d-1778621596106-7\",\n  \"evidence\": \"priorizar porque fundador técnico em fase de produto → feedback acelera roadmap (H1)\",\n  \"heuristic_ignored\": \"H2 — Dor específica em hipótese não validada\",\n  \"severity\": \"med\",\n  \"target\": \"prompt-issue\"\n}", "result_preview": "{\"target_file\":\"prompts/qualificador.md\",\"proposed_change\":\"1. Inserir uma regra de precedência explícita na seção de heurísticos: **H2 deve ser avaliada antes de H1**. O agente só deve aplicar o bônus do perfil do fundador técnico (H1) quando a dor específica do lead já tiver sido mapeada para uma hipótese validada ou…", "result_full": "{\"target_file\":\"prompts/qualificador.md\",\"proposed_change\":\"1. Inserir uma regra de precedência explícita na seção de heurísticos: **H2 deve ser avaliada antes de H1**. O agente só deve aplicar o bônus do perfil do fundador técnico (H1) quando a dor específica do lead já tiver sido mapeada para uma hipótese validada ou, no mínimo, quando não houver evidência de que a dor pertence a uma hipótese não validada (H-NV1, H-NV2, etc.).\\n\\n2. Adicionar uma verificação obrigatória de \\\"checkpoint de hipótese\\\" no fluxo de raciocínio: antes de concluir que um lead deve ser priorizado por ser \\\"fundador técnico em fase de produto → feedback acelera roadmap\\\", o agente deve explicitamente escrever no campo `reasoned` se a dor do lead está fora do escopo das hipóteses validadas. Se a dor for genérica (\\\"feedback de produto\\\") e não estiver vinculada à automação de qualificação (H-NV1) ou explicabilidade técnica (H-NV2), o agente deve marcar `out_of_scope` ou reduzir o tier, mesmo que o perfil do fundador seja tecnicamente atrativo.\\n\\n3. Atualizar a descrição de H1 para deixar claro que ela é um **tiebreaker de fit**, não um override de problem-solution fit: \\\"O bônus de fundador técnico (H1) só eleva a prioridade de leads que já demonstraram dor alinhada ao ICP atual (infoprodutores R$ 50k-500k/mês). Ele nunca deve elevar leads cujo problema principal não foi validado ou que está fora do escopo de atuação do time de 3 pessoas.\\\"\",\"rationale\":\"A divergência mostra que o agente está usando H1 (perfil do fundador técnico) como um atalho para priorizar leads, ignorando H2 (dor atrelada a hipótese não validada). No contexto atual de produto em validação com time enxuto, receber feedback de roadmap de um fundador técnico é uma oportunidade secundária — não justifica priorizar um lead se o problema dele não mapeia para as hipóteses que estamos testando (H-NV1, H-NV2). Sem essa regra de precedência no prompt, o agente continuará inflando a prioridade de leads fora do ICP apenas porque o interlocutor tem perfil técnico.\"}", "elapsed_ms": 0, "children": [{"tool": "read", "thinking": "The user wants me to execute the function `suggest_adjustment` based on the skill description. The arguments are:\n\n1. `divergencia`: \n   - decision_id: d-1778621596142-6\n   - heuristic_ignored: H6 — Default por tier A\n   - evidence: descartar mesmo tier A — interlocutor sinalizou descomprometimento na call\n   - severity: high\n   - bucket_key: descartar/A/0\n   - target: criterio-faltando\n\n2. `current_content`: The rubric for ICP objective axis.\n3. `contexto_momento`: The context-moment markdown.\n\nAccording to the skill, I need to:\n- Conforme `target`, load `references/ajuste-<target>.md` and follow the template.\n- Use `contexto_momento` to ground the suggestion.\n\nFirst, I need to read the reference file `references/ajuste-criterio-faltando.md`. But I don't have that file content given to me. Let's see if it's in the wo ll body to see schema and query patterns.\n\nLet's read .agents/skills/investigate-data/SKILL.md and perhaps references.", "input_preview": "{ \"path\": \".agents/skills/investigate-data/SKILL.md\" }", "input_full": "{\n  \"path\": \".agents/skills/investigate-data/SKILL.md\"\n}", "result_preview": "--- name: investigate-data description: Como investigar tendências e padrões cross-janela no D1 do qualificador usando a tool `query_decision_log(sql)`. Útil pra detectar regressão, growth de out_of_scope, blow-out de custo, ou validar se um padrão observado no run atual aparece em janelas anteriores. NÃO é um tool — é…", "result_full": "---\nname: investigate-data\ndescription: Como investigar tendências e padrões cross-janela no D1 do qualificador usando a tool `query_decision_log(sql)`. Útil pra detectar regressão, growth de out_of_scope, blow-out de custo, ou validar se um padrão observado no run atual aparece em janelas anteriores. NÃO é um tool — é conhecimento ambiente. A tool tem cap (10 queries/run, max 100 rows, só SELECT em decision_log/lead). Use antes de finalizar o summarize quando quiser confirmar se um padrão é sistêmico ou pontual. Consulte references/ pra queries prontas (tendência) e padrões de exploração ad-hoc.\nmodel: main\n---\n\n# Investigate Data\n\nVocê tem acesso direto ao D1 do agente qualificador via tool `query_decision_log(sql)`. Use pra responder perguntas que os dados de candidatos no prompt não respondem por si só.\n\n## Quando vale fazer query\n\n- **Antes de finalizar**: verificar se o padrão detectado no run atual é tendência (`regression`, `out_of_scope_growth`) ou ruído pontual. Sem isso, severity fica calibrada só com 1 janela.\n- **Validação cross-bucket**: se 2 buckets diferentes mostram o mesmo heurístico ignorado, vale ver se outras decisões fora dos buckets ativos também ignoram o mesmo heurístico.\n- **Investigação de outlier**: se 1 decisão tem reasoning bizarro, vale ver se aquele lead (`lead_id`) aparece em outras decisões do agente — pode revelar problema sistêmico com aquele perfil.\n- **Custo anômalo**: se uma decisão tem `cost_usd` ou `duration_ms` atípico, vale comparar com janela anterior.\n\n## Quando NÃO fazer query\n\n- Você já tem evidência suficiente do conjunto inline no prompt — não desperdice o cap.\n- Pra olhar **as decisões individuais que estão no prompt** — elas já estão lá. Query é pra dados que NÃO vieram inline.\n- Pra rodar consulta sem hipótese — \"vou ver o que tem aí\" é desperdício. Pergunte primeiro \"que sinal eu quero confirmar?\".\n\n## Schema do D1 disponível (read-only)\n\n```sql\n-- 1 linha por decisão tomada pelo qualificador\ndecision_log (\n  id TEXT PRIMARY KEY,\n  ts INTEGER NOT NULL,           -- epoch ms\n  agent_id TEXT NOT NULL,        -- pseudonimizado (HMAC)\n  thread_id TEXT NOT NULL,\n  domain TEXT NOT NULL,\n  phase TEXT,\n  did TEXT NOT NULL,             -- 'priorizar' | 'manter' | 'descartar' (texto do outcome)\n  reasoned TEXT NOT NULL,        -- raciocínio articulado X porque Y → Z\n  out_of_scope TEXT,             -- preenchido quando faltou dado pra aplicar heurístico\n  tools_called TEXT,             -- JSON array de tools invocadas (raramente útil)\n  duration_ms INTEGER,\n  cost_usd REAL,\n  model_main TEXT,\n  expected_reasoning_ref TEXT,\n  outcome TEXT,\n  outcome_source TEXT,\n  objective_tier TEXT NOT NULL,  -- 'A' | 'B' | 'C' (score objetivo da rubrica)\n  judgment_outcome TEXT NOT NULL,-- 'priorizar' | 'manter' | 'descartar' (canônico)\n  has_out_of_scope INTEGER NOT NULL DEFAULT 0,  -- 0 ou 1\n  lead_id TEXT\n);\n\n-- 1 linha por lead avaliado\nlead (\n  id TEXT PRIMARY KEY,\n  segmento TEXT,\n  faturamento_band TEXT,\n  time_vendas TEXT,\n  ferramentas TEXT,\n  sinal TEXT,\n  fundador_tecnico INTEGER,\n  menciona_dor INTEGER,\n  contexto_livre_sanitized TEXT\n);\n```\n\nÍndices úteis: `idx_decision_log_window(agent_id, ts)`, `idx_decision_log_bucket(judgment_outcome, objective_tier, has_out_of_scope)`, `idx_decision_log_lead(lead_id)`.\n\n## Restrições duras da tool\n\n- Só `SELECT` (DML/DDL rejeitados pelo parser).\n- Só `FROM decision_log` ou `FROM lead` (ou JOIN entre os dois). `audit_run` e `decision_log_rejected` são bloqueados — não interessam.\n- `LIMIT 100` é forçado (queries sem LIMIT recebem `LIMIT 100` adicionado).\n- Timeout 5s.\n- Cap de 10 queries por run — gaste com hipótese clara.\n\n## Exemplos rápidos\n\n### 1. Comparar % out_of_scope janela atual vs anterior\n\nUse quando quiser saber se OOS está crescendo.\n\n```sql\nSELECT\n  CASE WHEN ts > ? THEN 'atual' ELSE 'anterior' END AS janela,\n  COUNT(*) AS total,\n  SUM(has_out_of_scope) AS oos,\n  SUM(has_out_of_scope) * 100.0 / COUNT(*) AS oos_pct\nFROM decision_log\nWHERE agent_id = ? AND ts > ? AND ts <= ?\nGROUP BY 1;\n```\n\n(Parâmetros são strings — o agente substitui pelos timestamps reais lidos do prompt.)\n\n### 2. Heurístico ignorado em outros buckets\n\nSe você detectou H6 ignorado em `descartar/A/0`, vale ver se aparece em outras combinações.\n\n```sql\nSELECT judgment_outcome, objective_tier, has_out_of_scope, COUNT(*) AS n\nFROM decision_log\nWHERE agent_id = ? AND reasoned LIKE '%tier A%' AND reasoned LIKE '%descomprometimento%'\nGROUP BY 1,2,3;\n```\n\n### 3. Quantos leads únicos vs decisões repetidas\n\n```sql\nSELECT lead_id, COUNT(*) AS decisoes\nFROM decision_log\nWHERE agent_id = ? AND ts > ?\nGROUP BY lead_id\nHAVING COUNT(*) > 1\nORDER BY decisoes DESC\nLIMIT 20;\n```\n\n## Como pensar antes de cada query\n\n1. **Qual a hipótese?** Escreva (mesmo só pra você no thinking): \"Hipótese: o heurístico X foi violado em mais de N decisões fora desse bucket.\"\n2. **Que coluna distingue?** A query precisa de uma coluna binária ou agregada que confirme/refute.\n3. **Que LI", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": "We have the investigate-data skill. Let's read the reference files for queries.", "input_preview": "{ \"path\": \"references/queries-de-tendencia.md\" }", "input_full a), genérica demais (dispara sem precisão), ou o mecanismo causal já não bate com a realidade do produto/mercado. O…", "result_full": "# Target: gabarito-stale\n\n## Quando aplicar\nO heurístico do gabarito (`expected-reasoning/qualificador/fit-estrategico.md`) está fraco: a condição é específica demais (não captura caso recorrente que deveria), genérica demais (dispara sem precisão), ou o mecanismo causal já não bate com a realidade do produto/mercado. O `reasoned` do agente revela um raciocínio mais maduro que o próprio gabarito — e isso aparece em múltiplos casos. O contexto-momento em si está OK; quem precisa refinar é o Hx.\n\n## Sinais positivos\n- `reasoned` articula uma versão mais nuançada/precisa que o texto do Hx\n- A condição do Hx é binária mas a realidade é gradiente (ex: \"fundador técnico\" vs \"qualquer perfil técnico no time\")\n- Hx não cobre um caso comum que claramente devia entrar nele\n- Padrão se repete em buckets distintos com o mesmo Hx\n\n## Sinais que NÃO indicam gabarito-stale (anti-patterns)\n- Agente ignorou um Hx claro cujo texto está bom → `prompt-issue`\n- Capacidade/fase do contexto-momento mudou e Hx ainda referencia o antigo → `contexto-mudou`\n- Fator usado no `reasoned` deveria estar na rubrica objetiva → `criterio-faltando`\n- Caso único sem recorrência → `inconclusive`\n\n## Fronteira com targets adjacentes\n| Pista | gabarito-stale | Outro target |\n|---|---|---|\n| Texto do Hx precisa refinar condição/mecanismo | sim | — |\n| Hx OK mas prompt não invoca | não | prompt-issue |\n| Hx OK mas contexto-momento antigo | não | contexto-mudou |\n| Dimensão nova que merece Hx ou critério próprio | não | criterio-faltando |\n\n## Exemplo worked\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H2 — Dor específica em hipótese não validada\",\n  \"evidence\": \"lead menciona 'desafio operacional na qualificação manual' sem ser exatamente as hipóteses H-NV1/H-NV2; reasoned diz 'priorizar porque interlocutor menciona desafio operacional → aprendizado supera custo'\",\n  \"severity\": \"med\"\n}\n```\n\n**Output esperado:**\n```json\n{\n  \"target\": \"gabarito-stale\",\n  \"rationale\": \"reasoned articula H2 de forma mais nuançada que o gabarito — o texto atual exige coincidência literal com hipótese não validada, mas a evidência mostra que qualquer desafio operacional adjacente já é aprendizado relevante. O Hx precisa refinar a condição de 'dor coincidente com hipótese' pra abrir pra adjacências\"\n}\n```\n\n## Limites de escopo\nNão propor o texto novo do Hx aqui — isso é trabalho do `suggest-adjustment`. Aqui só classifica.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \"/workspace/.agents/skills/classify-origin/references/criterio-faltando.md\" }", "input_full": "{\n  \"path\": \"/workspace/.agents/skills/classify-origin/references/criterio-faltando.md\"\n}", "result_preview": "# Target: criterio-faltando ## Quando aplicar A rubrica objetiva (`agents-config/qualificador/criterios-icp.md`) não pondera uma dimensão que o agente está sistematicamente usando pra justificar decisão. O `reasoned` puxa do contexto-livre um fator que parece objetivo (mensurável, recorrente), mas nenhum dos 5 critério…", "result_full": "# Target: criterio-faltando\n\n## Quando aplicar\nA rubrica objetiva (`agents-config/qualificador/criterios-icp.md`) não pondera uma dimensão que o agente está sistematicamente usando pra justificar decisão. O `reasoned` puxa do contexto-livre um fator que parece objetivo (mensurável, recorrente), mas nenhum dos 5 critérios atuais (segmento, faturamento, time, ferramentas, sinal de intenção) cobre. O Hx do gabarito não dá conta porque não é refinamento de heurístico — é dimensão objetiva ausente da rubrica.\n\n## Sinais positivos\n- `reasoned` justifica decisão por fator objetivo (ex: \"tem 10k usuários ativos\", \"API integrada com Stripe\", \"100 leads/mês\")\n- O fator aparece em buckets distintos como motivo de priorizar/descartar\n- A rubrica atual zera ou penaliza o lead apesar do fator forte\n- Os 5 critérios atuais claramente não modelam essa dimensão\n\n## Sinais que NÃO indicam criterio-faltando (anti-patterns)\n- Fator único, sem recorrência → `inconclusive` (ruído)\n- O fator já existe na rubrica e agente só ignorou → `prompt-issue`\n- O Hx do gabarito que cobriria o fator está fraco → `gabarito-stale`\n- A dimensão é capacidade/fase do próprio produto → `contexto-mudou`\n\n## Fronteira com targets adjacentes\n| Pista | criterio-faltando | Outro target |\n|---|---|---|\n| Rubrica não captura dimensão recorrente | sim | — |\n| Critério existe, agente não cita | não | prompt-issue |\n| Critério existe, peso/regra precisa refinar | não | gabarito-stale (raro) |\n| Dimensão é sobre nós (capacidade) | não | contexto-mudou |\n\n## Exemplo worked\n\n**Input divergence:**\n```json\n{\n  \"heuristic_ignored\": \"H5 — Score baixo sem sinal compensatório\",\n  \"evidence\": \"3 leads SaaS B2B com >10k usuários ativos descartados como tier C (faturamento <50k) — reasoned cita 'base de usuários relevante mas rubrica não pondera' em 2 dos 3 casos\",\n  \"severity\": \"high\"\n}\n```\n\n**Output esperado:**\n```json\n{\n  \"target\": \"criterio-faltando\",\n  \"rationale\": \"múltiplos leads SaaS B2B com >10k usuários ativos descartados porque rubrica só pondera faturamento mensal — base de usuários ativos é dimensão objetiva, recorrente em buckets distintos, e nenhum dos 5 critérios atuais captura. Não é prompt-issue (agente até reconhece a lacuna no reasoned) nem gabarito-stale (Hx não cobre essa dimensão)\"\n}\n```\n\n## Limites de escopo\nNão definir aqui o peso novo nem qual critério perde — isso é tarefa do `suggest-adjustment` com `ajuste-criterio.md`.\n", "elapsed_ms": 0, "children": []}, {"tool": "read", "thinking": null, "input_preview": "{ \"path\": \"/workspace/.agents/skills/classify-origin/references/contexto-mudou.md\" }", "input_full": "{\n  \"path\": \"/workspace \": \".agents/skills/choose-representatives/SKILL.md\"\n}", "result_preview": "--- name: choose-representatives description: Como escolher K representantes pra auditar dentro de um bucket de decisões. Prioriza divergência aparente do gabarito > diversidade de lead > random. NÃO é um tool — é conhecimento ambiente consultado pelo auditor agêntico antes de chamar `detect_divergences`. Se bucket tem…", "result_full": "---\nname: choose-representatives\ndescription: Como escolher K representantes pra auditar dentro de um bucket de decisões. Prioriza divergência aparente do gabarito > diversidade de lead > random. NÃO é um tool — é conhecimento ambiente consultado pelo auditor agêntico antes de chamar `detect_divergences`. Se bucket tem ≤K decisões, audite todas e pule a escolha. Consulte references/ pra padrões linguísticos detalhados.\nmodel: main\n---\n\n# Choose Representatives\n\nVocê está auditando decisões de um agente qualificador. Cada bucket tem N decisões; você só pode pagar o custo de auditar K (cap duro no tool `detect_divergences`). Escolha bem — auditar K decisões aleatórias é desperdício se há sinais óbvios pra priorizar.\n\n## Input mental\n\n- `bucket_key`: identifica o quadrante (judgment/tier/oos) — diz que tipo de viés esperar\n- Lista de decisões com `decision_id`, `reasoned`, `out_of_scope`, `lead`\n- `K`: cap por bucket (geralmente 3)\n\n## Procedimento (em ordem)\n\n### Passo 1 — Triage por sinal de divergência aparente\n\nAntes de tudo, varra o `reasoned` de cada decisão procurando **padrões linguísticos suspeitos**. Sinais fortes:\n\n- **Flip contra tier**: bucket é `descartar/A/*` ou `priorizar/C/*`. Esses são por definição candidatos prioritários — o agent contrariou o score objetivo. Geralmente vale auditar **todos** nesses buckets, mesmo que > K (mas o tool vai cortar em K — escolha os K mais suspeitos).\n- **Justificativa subjetiva sem heurístico**: reasoning cita \"interlocutor sinalizou X\", \"sinal forte de Y\", \"intenção forte\", \"potencial de upside\" sem invocar nenhum heurístico do gabarito (H1, H2, etc.) por sigla ou mecânica.\n- **Contradição interna**: reasoning diz \"menciona dor X\" mas o `lead.menciona_dor === 0`; ou diz \"fundador técnico\" mas `lead.fundador_tecnico === 0`.\n- **OOS texto suspeito**: campo `out_of_scope` com afirmação ampla tipo \"faltou contexto\" mas o `lead.contexto_livre_sanitized` tem texto rico.\n\nMarque as decisões que disparam ≥1 sinal forte como **suspeitas**.\n\n### Passo 2 — Se há suspeitas ≤ K\n\nEscolha **todas** as suspeitas. Completa o restante até K com diversidade (passo 3).\n\n### Passo 3 — Se há suspeitas > K\n\nPegue as K com mais sinais fortes acumulados. Desempate por diversidade de lead (passo 3).\n\n### Passo 4 — Se não há suspeitas\n\nUse diversidade pra escolher K. Maximize variabilidade em (segmento, faturamento_band, time_vendas, fundador_tecnico, menciona_dor):\n\n- Tente cobrir pelo menos 2 segmentos distintos\n- Tente cobrir pelo menos 2 faixas de faturamento\n- Evite 2 reps com mesmo (segmento, faturamento_band, time_vendas)\n\nSe ainda assim houver empate, ordem de inserção (primeiros K do bucket).\n\n## Worked examples\n\n**Exemplo 1 — bucket `descartar/A/0` com 4 decisões, K=3**:\n\nDecisões (resumido):\n- d-A1: reasoned \"descartar — interlocutor sinalizou descomprometimento\", lead={segmento:saas, faturamento:50-500k, fundador_tecnico:1, menciona_dor:1}\n- d-A2: reasoned \"descartar mesmo tier A — sinal forte de baixo engajamento\", lead={segmento:agencia, faturamento:0-50k}\n- d-A3: reasoned \"descartar porque H3 enterprise sem capacidade → manter (contradição: outcome=descartar mas justificativa pede manter)\", lead={faturamento:>5M}\n- d-A4: reasoned \"descartar porque H6 default tier A não se aplica em mid-market\", lead={faturamento:500k-5M}\n\nAnálise:\n- d-A1: suspeita FORTE — justificativa subjetiva (\"descomprometimento\") + ignora H1 (fundador_tecnico=1, menciona_dor=1 ambos disparam priorizar).\n- d-A2: suspeita FORTE — \"sinal forte de baixo engajamento\" não é heurístico do gabarito.\n- d-A3: suspeita FORTE — contradição interna entre justificativa e outcome.\n- d-A4: suspeita MÉDIA — invoca H6 mas inventa restrição \"não se aplica em mid-market\" não no gabarito.\n\nTodas suspeitas, são 4 > K=3. Escolha: d-A1, d-A2, d-A3 (3 sinais fortes claros). Deixa d-A4.\n\n**Exemplo 2 — bucket `priorizar/A/0` com 5 decisões alinhadas, K=3**:\n\nNenhuma decisão suspeita (reasoning cita H1/H2/H6 consistentemente). Use diversidade.\n\nEscolha 3 com leads em segmentos distintos: 1 saas+founder técnico, 1 agência+não técnico, 1 infoprodutor. Cobre 3 segmentos × 3 faturamentos diferentes.\n\n## NÃO FAZER\n\n- Não classifique origem (`prompt-issue` etc.) — isso é skill diferente, vem depois.\n- Não chame `detect_divergences` mais que K vezes por bucket — o tool rejeita.\n- Não escolha apenas a 1ª decisão de cada bucket sem inspecionar — vira sampling random, perde valor do agentic.\n- Não copie o reasoned bruto pro classify; suspeição aqui ≠ divergência confirmada (isso é detect-divergences que decide).\n- Não invente sinais novos sem evidência literal no `reasoned`/`out_of_scope`/`lead`.\n\n## Output\n\nEsta skill **não retorna nada estruturado** — é conhecimento ambiente. Após consultar, simplesmente chame `detect_divergences(decision_id)` nos K escolhidos.\n\nPara padrões linguísticos detalhados de \"justificativa subjetiva\" e \"contradição interna\", consulte `references/sinais-de-divergencia-aparente.md`.\n", "elapsed_ms": 0, "children": []}, {"tool": "detect_divergences", "thinking": "Now I have a clearer picture. Let me also read the reference for signals if needed, but I think I have enough.\n\nLet me evaluate each bucket:\n\n**Bucket `descartar/C/1`** — 1 decision, K=3, so audit all:\n- d-1778592437432-5: descartar porque tier C. H5 says \"Se score objetivo é C AND nenhum dos heurísticos acima se aplica → descartar\". But wait, this is bucket `descartar/C/1` which means descartar/tier s \"Se o lead pediu demo direta\". H5 says C → descartar unless other heurísticos apply. None apply. These are all strong candidates for divergence.\n\nBut wait, there's a nuance: H4 says \"sinal forte com fit médio\" (demo + score B). Here the agent is claiming \"sinal forte de intenção\" for tier C. But the sinal is \"material\" which is not demo. And the tier is C, not B.\n\nSo all three seem like clear divergences. Since I can audit all 3 (bucket has exactly 3), I will.\n\nLet me now plan the detect_divergences calls. Since I can parallelize between buckets, let me call them all at once but limited to 3 per bucket. Actually, I can call all 8 at once (1+2+3+3=8), but I should be careful about rate. Actually, the instructions say I can parallelize between buckets. Let me group them:\n\nTotal: 1 (descartar/C/1) + 2 (priorizar/A/1) + 3 (descartar/A/0) + 3 (priorizar/C/0) = 9 calls.\n\nI can call all 9 in parallel. Actually, let me check if there are any tool limits. The instructions don't mention a global limit, only per bucket limit of 3.\n\nLet me proceed with all detections.\n\nRepresentatives:\n1. descartar/C/1: d-1778592437432-5\n2. priorizar/A/1: d-1778592437478-5, d-1778595877601-7\n3. descartar/A/0: d-1778595877526-6, d-1778595877562-0, d-1778595877603-9\n4. priorizar/C/0: d-1778595877566-3, d-1778595877571-7, d-1778595877595-3\n\nThat's 9 calls. Let me make them all.", "input_preview": "{ \"decision_id\": \"d-1778592437432-5\" }", "input_full": "{\n  \"decision_id\": \"d-1778592437432-5\"\n}", "result_preview": "{\"decision_id\":\"d-1778592437432-5\",\"bucket_key\":\"descartar/C/1\",\"divergences\":[]}", "result_full": "{\"decision_id\":\"d-1778592437432-5\",\"bucket_key\":\"descartar/C/1\",\"divergences\":[]}", "elapsed_ms": 0, "children": [], "sub_kind": "detect"}, {"tool": "detect_divergences", "thinking": null, "input_preview": "{ \"decision_id\": \"d-1778592437478-5\" }", "input_full": "{\n  \"decision_id\": \"d-1778592437478-5\"\n}", "result_preview":
